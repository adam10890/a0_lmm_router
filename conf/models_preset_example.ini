# models_preset_example.ini — llama.cpp native Router Mode preset
#
# This file is referenced by --models-preset when running in Router Mode.
# Each [section] matches the model alias (set via --alias or the filename stem).
# Settings override the global server defaults for that specific model.
#
# How to use:
#   1. Copy this file to your models directory:
#        cp conf/models_preset_example.ini /path/to/models/preset.ini
#   2. Point your slot at it in llama_cpp_servers.yaml:
#        router_models_preset: "/models/preset.ini"
#   3. Clients request a model by alias in the API:
#        POST /v1/chat/completions  { "model": "chat", ... }
#        POST /v1/chat/completions  { "model": "utility", ... }
#        POST /v1/embeddings        { "model": "embed", ... }
#
# Format reference: https://github.com/ggml-org/llama.cpp/blob/master/examples/server/README.md

# ──────────────────────────────────────────────────────────────────────────────
# Chat model — large context, reasoning, general assistant
# ──────────────────────────────────────────────────────────────────────────────
[chat]
# alias used in API "model" field
alias = chat
# path relative to --models-dir (or absolute)
model = utility/qwen3.5_9b/Qwen3.5-9B-Q4_K_M.gguf
ctx_size = 65536
n_gpu_layers = -1
cache_type_k = q4_0
cache_type_v = q4_0
flash_attn = on

# ──────────────────────────────────────────────────────────────────────────────
# Utility model — smaller, fast, tool-calling, sub-agent tasks
# ──────────────────────────────────────────────────────────────────────────────
[utility]
alias = utility
model = utility/qwen3.5_9b/Qwen3.5-9B-Q4_K_M.gguf
ctx_size = 16384
n_gpu_layers = -1
flash_attn = on

# ──────────────────────────────────────────────────────────────────────────────
# Embedding model — vector search, memory retrieval
# ──────────────────────────────────────────────────────────────────────────────
[embed]
alias = embed
model = embedding/nomic/nomic-embed-text-v1.5.Q4_K_M.gguf
ctx_size = 8192
n_gpu_layers = -1
embedding = true

# ──────────────────────────────────────────────────────────────────────────────
# Micro router — ultra-fast classifier for task routing decisions
