# a0_lmm_router — Agent Zero provider metadata.
#
# This plugin runs the llama.cpp Router Mode fleet separately. These entries only
# teach Agent Zero's Model Configuration UI how to call it as an OpenAI-compatible
# endpoint. Configure the API base per model/preset, usually:
#   http://host.docker.internal:8080/v1

chat:
  lmm_router:
    name: LMM Router
    litellm_provider: openai
    models_list:
      endpoint_url: "/models"
    kwargs:
      custom_llm_provider: openai

embedding:
  lmm_router:
    name: LMM Router
    litellm_provider: openai
    models_list:
      endpoint_url: "/models"
    kwargs:
      custom_llm_provider: openai
