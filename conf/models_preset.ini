; models_preset.ini — llama.cpp native Router Mode preset
;
; Referenced via `--models-preset` when the fleet is started with
; docker-compose.lmm.router.yml. Maps client-facing aliases ("chat",
; "utility", "embedding") to specific GGUF files. The server hot-swaps
; between them based on the "model" field in API requests; `--models-max`
; in the compose controls how many can be resident in VRAM at once.
;
; SYNTAX NOTES (verified empirically against image b8840-9e5647aff on
; 2026-05-21):
;   - Only `alias =` and `model =` are accepted in this build. Keys like
;     `ctx_size`, `n_gpu_layers`, `flash_attn`, `cache_type_k` get rejected
;     with "option '<key>' not recognized in preset '<alias>'". Per-model
;     overrides may land in a later build.
;   - `model =` must be an ABSOLUTE container path. It is NOT joined with
;     --models-dir. The binary passes the string straight to
;     gguf_init_from_file, which fails with "No such file or directory"
;     for relative paths.

[chat]
alias = chat
model = /models/utility/gemma-4-e4b-uncensored/gemma-4-E4B-it-uncensored-Q4_K_M.gguf

[utility]
alias = utility
model = /models/utility/qwen3.5_9b/Qwen3.5-9B-Q4_K_M.gguf

[embedding]
alias = embedding
model = /models/embedding/nomic/nomic-embed-text-v1.5.Q4_K_M.gguf
; Enable embedding mode for this child server only. Verified accepted on
; b8840-9e5647aff (unlike ctx_size which is rejected in this build).
embedding = true
