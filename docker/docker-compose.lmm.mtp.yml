# docker-compose.lmm.mtp.yml — MTP override for llama.cpp fleet
#
# Enables Multi-Token Prediction on the UTILITY slot (Qwen3.5).
# MTP uses the model's own prediction heads to generate multiple tokens
# per step — roughly 1.3-1.5x faster with no quality loss.
#
# SUPPORTED models: Qwen3.5, DeepSeek V3/R1, GLM4
# NOT supported:    Gemma, Mistral, Phi, LFM, SuperGemma
#
# IMPORTANT: Requires llama.cpp image built AFTER May 16, 2026
#            (post-b8047, PR #22673)
#
# Usage (instead of plain up):
#   docker compose \
#     -f usr/plugins/a0_lmm_router/docker/docker-compose.lmm.yml \
#     -f usr/plugins/a0_lmm_router/docker/docker-compose.lmm.mtp.yml \
#     up -d
#
# Or use start_with_mtp.bat in the plugin docker folder.

name: a0-lmm

services:
  a0-llama-utility:
    # Append --spec-type mtp to the existing command
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--alias"
      - "utility"
      - "--model"
      - "${UTILITY_MODEL_PATH}"
      - "--n-gpu-layers"
      - "${UTILITY_GPU_LAYERS:-999}"
      - "--ctx-size"
      - "${UTILITY_CTX_SIZE:-16384}"
      - "--parallel"
      - "${UTILITY_PARALLEL:-1}"
      - "--batch-size"
      - "${UTILITY_BATCH_SIZE:-512}"
      - "--flash-attn"
      - "--spec-type"
      - "mtp"
