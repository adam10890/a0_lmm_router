# docker-compose.lmm.mtp.yml — MTP override for llama.cpp fleet
#
# Enables Multi-Token Prediction (MTP) speculative decoding on the UTILITY
# slot. MTP uses prediction heads baked into the model weights to generate
# multiple tokens per forward pass — ~1.85x decode speedup per the PR
# benchmark (RTX 3090: 22.97 → 42.45 tok/s, ~70-75% draft accept rate).
# NOTE: prompt processing is slightly slower (device-to-host embedding xfer).
#
# Canonical reference: https://github.com/ggml-org/llama.cpp/pull/22673
# (merged 2026-05-16, commit 10829dbcce69eb4ac5bfea6c649eeb5f60b5d7c3)
#
# SUPPORTED models per the PR:
#   - Qwen3.6-27B
#   - Qwen3.6-35BA3B (MoE)
#   - Other models with embedded MTP weights (DeepSeek V3/R1)
# NOT supported: Qwen3.5, Gemma, Mistral, Phi, LFM, SuperGemma
#
# IMPORTANT: Requires a llama.cpp build that includes PR #22673.
# The published `ghcr.io/ggml-org/llama.cpp:server-cuda` image as of
# 2026-05-21 does NOT yet contain it — running this override against
# that image will crash the slot with
#   error while handling argument "--spec-type": unknown speculative
#   decoding type without draft model
# Build a custom image from llama.cpp master (post-10829dbc) until the
# ghcr image is rebuilt.
#
# Usage (instead of plain up):
#   docker compose \
#     -f usr/plugins/a0_lmm_router/docker/docker-compose.lmm.yml \
#     -f usr/plugins/a0_lmm_router/docker/docker-compose.lmm.mtp.yml \
#     up -d
#
# Or use start_with_mtp.bat in the plugin docker folder.

name: a0-lmm

services:
  a0-llama-utility:
    # Replace the base command with one that includes --spec-type draft-mtp
    # (per PR #22673). Override compose merges by replacing the command list.
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--alias"
      - "utility"
      - "--model"
      - "${UTILITY_MODEL_PATH}"
      - "--n-gpu-layers"
      - "${UTILITY_GPU_LAYERS:-999}"
      - "--ctx-size"
      - "${UTILITY_CTX_SIZE:-16384}"
      - "--parallel"
      - "${UTILITY_PARALLEL:-1}"
      - "--batch-size"
      - "${UTILITY_BATCH_SIZE:-512}"
      - "--flash-attn"
      - "on"
      # MTP per PR #22673 — see https://github.com/ggml-org/llama.cpp/pull/22673
      - "--spec-type"
      - "draft-mtp"
      - "--spec-draft-n-max"
      - "${UTILITY_SPEC_DRAFT_N_MAX:-2}"
