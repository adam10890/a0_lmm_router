<!-- a0_lmm_router dashboard — A0-native design (Catppuccin Mocha palette) -->
<div x-data>
  <template x-if="true">
    <div x-data="createDashboardStore()" x-init="init()" x-destroy="cleanup()"
         style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--color-bg,#1e1e2e);color:var(--color-fg,#cdd6f4);min-height:100%;">

      <style>
        /* Catppuccin Mocha tokens — fall back when A0 theme vars are missing */
        .lmm-dash { --ok:#a6e3a1; --warn:#f9e2af; --err:#f38ba8; --info:#89b4fa; --accent:#cba6f7; --teal:#94e2d5;
                    --muted:#6c7086; --soft:#a6adc8; --surface:#181825; --surface2:#11111b; --border:#313244; --border-soft:#45475a;
                    max-width:1100px; margin:0 auto; padding:20px 16px 32px; }
        .lmm-dash * { box-sizing:border-box; }

        /* Header */
        .lmm-hdr { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }
        .lmm-hdr-title { display:flex; align-items:center; gap:10px; }
        .lmm-hdr-title h1 { font-size:1.2rem; font-weight:700; color:var(--color-fg,#cdd6f4); margin:0; }
        .lmm-hdr-title svg { flex-shrink:0; }
        .lmm-live { display:inline-flex; align-items:center; gap:6px; font-size:.7rem; font-weight:600; color:var(--ok); letter-spacing:.06em; padding:2px 8px; border-radius:20px; background:#a6e3a118; border:1px solid #a6e3a130; }
        .lmm-live .pulse { width:6px; height:6px; border-radius:50%; background:var(--ok); animation:lmm-pulse 2s ease-in-out infinite; }
        @keyframes lmm-pulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--ok)} 50%{opacity:.4;box-shadow:none} }
        .lmm-ts { margin-left:auto; font-size:.72rem; color:var(--muted); }

        /* Sections (matches bmad_method) */
        .section { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:14px; overflow:hidden; }
        .section-head { padding:10px 16px; background:var(--color-bg,#1e1e2e); border-bottom:1px solid var(--border);
                        display:flex; align-items:center; gap:10px; }
        .section-title { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--info);
                         display:flex; align-items:center; gap:8px; }
        .section-title svg { flex-shrink:0; }
        .section-meta { margin-left:auto; font-size:.72rem; color:var(--muted); }
        .section-body { padding:14px 16px; }

        /* Compute grid */
        .compute-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
        .compute-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
        .compute-card-hdr { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
        .compute-card-title { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
        .compute-badge { margin-left:auto; font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.04em; }
        .badge-ok   { background:#a6e3a120; color:var(--ok);   border:1px solid #a6e3a140; }
        .badge-warn { background:#f9e2af20; color:var(--warn); border:1px solid #f9e2af40; }
        .badge-err  { background:#f38ba820; color:var(--err);  border:1px solid #f38ba840; }
        .badge-info { background:#89b4fa20; color:var(--info); border:1px solid #89b4fa40; }

        /* Bars */
        .bar-wrap { background:var(--color-bg,#1e1e2e); border:1px solid var(--border); border-radius:6px; height:16px; overflow:hidden; position:relative; margin:4px 0; }
        .bar-fill { height:100%; transition:width .4s ease; }
        .bar-fill.ok   { background:var(--ok); }
        .bar-fill.warn { background:var(--warn); }
        .bar-fill.err  { background:var(--err); }
        .bar-label { position:absolute; right:8px; top:0; line-height:16px; font-size:.7rem; font-weight:700; color:var(--color-fg,#cdd6f4); }

        /* Stat rows */
        .stat-row { display:flex; justify-content:space-between; align-items:center; font-size:.78rem; padding:3px 0; }
        .stat-key { color:var(--muted); }
        .stat-val { color:var(--color-fg,#cdd6f4); font-weight:600; }

        /* Slot list */
        .slot-item { display:grid; grid-template-columns:auto 1fr auto auto; gap:10px; align-items:center;
                     padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
        .slot-item.broken { border-color:#f38ba860; }
        .slot-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .slot-dot.on   { background:var(--ok);   box-shadow:0 0 6px #a6e3a180; }
        .slot-dot.warn { background:var(--warn); }
        .slot-dot.off  { background:var(--border-soft); }
        .slot-name { font-size:.88rem; font-weight:600; color:var(--color-fg,#cdd6f4); }
        .slot-meta { font-size:.72rem; color:var(--muted); font-family:'SF Mono','Menlo','Consolas',monospace; }
        .slot-status { font-size:.72rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
        .slot-btns { display:flex; gap:4px; }

        /* Buttons — modeled on A0 `.button.confirm/.cancel` */
        .btn { font-family:inherit; font-size:.76rem; font-weight:600; padding:5px 12px; border-radius:6px;
               border:1px solid transparent; cursor:pointer; transition:all .15s; white-space:nowrap; display:inline-flex; align-items:center; gap:5px; }
        .btn:disabled { opacity:.5; cursor:not-allowed; }
        .btn-confirm { background:#a6e3a120; color:var(--ok);   border-color:#a6e3a160; }
        .btn-confirm:hover:not(:disabled) { background:#a6e3a135; border-color:var(--ok); }
        .btn-cancel  { background:#f38ba820; color:var(--err);  border-color:#f38ba860; }
        .btn-cancel:hover:not(:disabled) { background:#f38ba835; border-color:var(--err); }
        .btn-primary { background:#89b4fa20; color:var(--info); border-color:#89b4fa60; }
        .btn-primary:hover:not(:disabled) { background:#89b4fa35; border-color:var(--info); }
        .btn-accent  { background:#cba6f720; color:var(--accent); border-color:#cba6f760; }
        .btn-accent:hover:not(:disabled) { background:#cba6f735; border-color:var(--accent); }
        .btn-ghost   { background:transparent; color:var(--soft); border-color:var(--border); }
        .btn-ghost:hover:not(:disabled) { color:var(--color-fg,#cdd6f4); border-color:var(--info); }

        .btn-row { display:flex; gap:6px; flex-wrap:wrap; }

        /* Recommendations */
        .rec-item { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center;
                    padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
        .rec-name { font-size:.85rem; font-weight:600; color:var(--color-fg,#cdd6f4); }
        .rec-detail { font-size:.72rem; color:var(--muted); margin-top:2px; }
        .rec-badge { font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.04em; }
        .rec-badge.installed { background:#a6e3a120; color:var(--ok); border:1px solid #a6e3a140; }
        .rec-badge.new       { background:#89b4fa20; color:var(--info); border:1px solid #89b4fa40; }

        /* Messages */
        .lmm-msg { font-size:.8rem; padding:10px 14px; border-radius:8px; margin-bottom:12px; line-height:1.45; }
        .lmm-msg.err   { background:#f38ba815; color:var(--err);  border:1px solid #f38ba840; }
        .lmm-msg.warn  { background:#f9e2af15; color:var(--warn); border:1px solid #f9e2af40; }
        .lmm-msg.info  { background:#89b4fa15; color:var(--info); border:1px solid #89b4fa40; }
        .lmm-msg.ok    { background:#a6e3a115; color:var(--ok);   border:1px solid #a6e3a140; }
        .lmm-msg code { background:var(--color-bg,#1e1e2e); padding:1px 6px; border-radius:4px; border:1px solid var(--border);
                        font-family:'SF Mono','Menlo','Consolas',monospace; font-size:.72rem; }

        .empty-state { text-align:center; padding:20px; color:var(--muted); font-size:.85rem; }
      </style>

      <div class="lmm-dash">

        <!-- Header -->
        <div class="lmm-hdr">
          <div class="lmm-hdr-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#cba6f7" stroke-width="1.5">
              <rect x="1" y="4" width="22" height="16" rx="3"/>
              <path d="M6 9h3v7H6zM11 7h3v9h-3zM16 11h3v5h-3z" fill="#cba6f7" fill-opacity=".25" stroke="none"/>
              <path d="M6 9v7M9 9v7M11 7v9M14 7v9M16 11v5M19 11v5" stroke-linecap="round"/>
            </svg>
            <h1>LMM Router</h1>
          </div>
          <div class="lmm-live"><div class="pulse"></div><span>LIVE</span></div>
          <a class="btn btn-ghost" href="/usr/plugins/a0_lmm_router/webui/model-test.html" target="_blank"
             style="margin-left:10px; text-decoration:none;"
             title="Send a test prompt to any slot and inspect reasoning_content / timings">
            🧪 Model Test
          </a>
          <div class="lmm-ts" x-text="'Updated ' + timeAgo()"></div>
        </div>

        <!-- Top-level messages -->
        <template x-if="error">
          <div class="lmm-msg err" x-text="error"></div>
        </template>
        <template x-if="loading && !error">
          <div class="lmm-msg info">Loading compute stats…</div>
        </template>

        <!-- ─── Compute section ──────────────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 2v4M18 2v4M6 18v4M18 18v4"/></svg>
              Compute
            </div>
            <div class="section-meta" x-text="hasGPU ? (gpus.length + ' GPU' + (gpus.length===1?'':'s')) : 'CPU only'"></div>
          </div>
          <div class="section-body">
            <div class="compute-grid">

              <!-- GPU cards -->
              <template x-for="gpu in gpus" :key="gpu.id">
                <div class="compute-card">
                  <div class="compute-card-hdr">
                    <span class="compute-card-title" x-text="'GPU ' + gpu.id"></span>
                    <span class="compute-badge"
                          :class="gpu.utilization_pct > 80 ? 'badge-err' : gpu.utilization_pct > 40 ? 'badge-warn' : 'badge-ok'"
                          x-text="gpu.utilization_pct + '% util'"></span>
                  </div>
                  <div class="stat-row">
                    <span class="stat-key" x-text="gpu.name"></span>
                    <span class="stat-val" x-text="gpu.temperature_c + '°C'"></span>
                  </div>
                  <div style="margin-top:8px">
                    <div class="stat-row">
                      <span class="stat-key">VRAM</span>
                      <span class="stat-val" x-text="fmtMB(gpu.used_vram_mb) + ' / ' + fmtMB(gpu.total_vram_mb)"></span>
                    </div>
                    <div class="bar-wrap">
                      <div class="bar-fill" :class="vramPct(gpu) > 85 ? 'err' : vramPct(gpu) > 60 ? 'warn' : 'ok'"
                           :style="'width:' + vramPct(gpu) + '%'"></div>
                      <span class="bar-label" x-text="vramPct(gpu) + '%'"></span>
                    </div>
                  </div>
                </div>
              </template>

              <!-- No-GPU fallback -->
              <template x-if="!hasGPU && !loading">
                <div class="compute-card">
                  <div class="compute-card-hdr">
                    <span class="compute-card-title">GPU</span>
                    <span class="compute-badge badge-warn">unavailable</span>
                  </div>
                  <div style="font-size:.78rem;color:var(--muted)">No GPU detected (nvidia-smi unavailable)</div>
                </div>
              </template>

              <!-- CPU / RAM card -->
              <div class="compute-card">
                <div class="compute-card-hdr">
                  <span class="compute-card-title">CPU / RAM</span>
                  <span class="compute-badge badge-info" x-text="cpu.load_pct.toFixed(0) + '% cpu'"></span>
                </div>
                <div class="stat-row">
                  <span class="stat-key">RAM</span>
                  <span class="stat-val" x-text="fmtMB(cpu.ram_used_mb) + ' / ' + fmtMB(cpu.ram_total_mb)"></span>
                </div>
                <div class="bar-wrap">
                  <div class="bar-fill" :class="ramPct() > 85 ? 'err' : ramPct() > 60 ? 'warn' : 'ok'"
                       :style="'width:' + ramPct() + '%'"></div>
                  <span class="bar-label" x-text="ramPct() + '%'"></span>
                </div>
                <div class="stat-row" style="margin-top:4px">
                  <span class="stat-key">Free</span>
                  <span class="stat-val" x-text="fmtMB(cpu.ram_free_mb)"></span>
                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- ─── Slots section ────────────────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
              llama.cpp Slots
            </div>
            <div class="section-meta" x-text="runningSlots + ' / ' + totalSlots + ' running'"></div>
            <button class="btn btn-accent"
                    @click="igniteFleet()"
                    :disabled="igniteState === 'pending'"
                    x-text="igniteState === 'pending' ? 'Checking…' : igniteState === 'ok' ? '✓ Fleet Healthy' : 'Verify Fleet'"
                    title="Probe every configured slot and tell you what to do next"></button>
          </div>
          <div class="section-body">

            <!-- Host-side ignition row -->
            <div class="btn-row" style="margin-bottom:10px">
              <button class="btn btn-confirm" @click="hostAction('run-bat')"  :disabled="igniteState === 'pending'"
                      title="Launch start_agent_zero.bat on the Windows host (detached)">▶ Run BAT</button>
              <button class="btn btn-confirm" @click="hostAction('ignite')"    :disabled="igniteState === 'pending'"
                      title="docker compose up -d via host helper">⚡ Ignite Fleet</button>
              <button class="btn btn-cancel"  @click="hostAction('extinguish')" :disabled="igniteState === 'pending'"
                      title="docker compose down via host helper">⏻ Extinguish</button>
              <button class="btn btn-ghost"   @click="hostAction('health')"    :disabled="igniteState === 'pending'"
                      title="Ping the host helper to check it's running">♥ Helper Health</button>
            </div>

            <!-- Ignite result banner -->
            <template x-if="igniteState !== 'idle'">
              <div class="lmm-msg"
                   :class="igniteState === 'ok' ? 'ok' : igniteState === 'error' ? 'err' : 'info'">
                <div x-text="igniteMessage"></div>
                <template x-if="igniteHostHint">
                  <div style="font-size:.72rem;margin-top:6px;opacity:.85">
                    Run on the host: <code x-text="igniteHostHint"></code>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="slots.length === 0 && !loading">
              <div class="empty-state">No llama.cpp slots configured yet.</div>
            </template>

            <template x-for="s in slots" :key="s.id">
              <div class="slot-item" :class="(s.running && !s.healthy) ? 'broken' : ''">
                <div class="slot-dot" :class="s.running ? (s.healthy ? 'on' : 'warn') : 'off'"></div>
                <div>
                  <div class="slot-name" x-text="s.id"></div>
                  <div class="slot-meta" x-text="s.role + (s.model_id ? ' · ' + s.model_id : '') + (s.port ? ' · :' + s.port : '')"></div>
                </div>
                <span class="slot-status"
                      :style="'color:' + (s.running ? (s.healthy ? 'var(--ok)' : 'var(--warn)') : 'var(--muted)')"
                      x-text="s.running ? (s.healthy ? 'healthy' : 'unhealthy') : 'stopped'"></span>
                <div class="slot-btns">
                  <button class="btn btn-confirm" x-show="!s.running" @click="controlSlot('start', s.id)">Start</button>
                  <button class="btn btn-cancel"  x-show="s.running"  @click="controlSlot('stop', s.id)">Stop</button>
                </div>
              </div>
            </template>

            <div class="btn-row" style="margin-top:10px">
              <button class="btn btn-confirm" @click="controlSlot('start_all')">Start All</button>
              <button class="btn btn-cancel"  @click="controlSlot('stop_all')">Stop All</button>
              <button class="btn btn-ghost"   @click="refresh()">Refresh</button>
            </div>
          </div>
        </div>

        <!-- ─── Recommendations section ──────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              Model Recommendations
            </div>
            <button class="btn btn-ghost" style="margin-left:auto" @click="_fetchRecommendations()">Refresh</button>
          </div>
          <div class="section-body">

            <template x-if="recommendations.length === 0 && !loading">
              <div class="empty-state">No recommendations available.</div>
            </template>

            <template x-for="rec in recommendations" :key="rec.filename">
              <div class="rec-item">
                <div>
                  <div class="rec-name" x-text="rec.name"></div>
                  <div class="rec-detail" x-text="rec.size_gb + ' GB · ' + rec.quant + ' · ' + rec.role + ' · ' + rec.reason"></div>
                </div>
                <span class="rec-badge" :class="rec.already_installed ? 'installed' : 'new'"
                      x-text="rec.already_installed ? 'INSTALLED' : 'NEW'"></span>
                <template x-if="!rec.already_installed">
                  <button class="btn btn-accent"
                          :disabled="installStatus[rec.filename] === 'downloading'"
                          @click="installModel(rec)"
                          x-text="installStatus[rec.filename] === 'downloading' ? 'Downloading…' : installStatus[rec.filename] === 'done' ? 'Done' : installStatus[rec.filename] === 'error' ? 'Failed' : 'Install'">
                  </button>
                </template>
              </div>
            </template>
          </div>
        </div>

      </div><!-- /lmm-dash -->
    </div>
  </template>
</div>

<script src="/usr/plugins/a0_lmm_router/webui/js/dashboard-store.js"></script>
