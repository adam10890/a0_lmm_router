<!-- a0_lmm_router dashboard — A0-native design (Catppuccin Mocha palette) -->
<div x-data>
  <template x-if="true">
    <div x-data="createDashboardStore()" x-init="init()" x-destroy="cleanup()" x-key="Date.now()"
         style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--color-bg,#1e1e2e);color:var(--color-fg,#cdd6f4);min-height:100%;">

      <style>
        /* Catppuccin Mocha tokens — fall back when A0 theme vars are missing */
        .lmm-dash { --ok:#a6e3a1; --warn:#f9e2af; --err:#f38ba8; --info:#89b4fa; --accent:#cba6f7; --teal:#94e2d5;
                    --muted:#6c7086; --soft:#a6adc8; --surface:#181825; --surface2:#11111b; --border:#313244; --border-soft:#45475a;
                    max-width:1100px; margin:0 auto; padding:20px 16px 32px; }
        .lmm-dash * { box-sizing:border-box; }

        /* Header */
        .lmm-hdr { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }
        .lmm-hdr-title { display:flex; align-items:center; gap:10px; }
        .lmm-hdr-title h1 { font-size:1.2rem; font-weight:700; color:var(--color-fg,#cdd6f4); margin:0; }
        .lmm-hdr-title svg { flex-shrink:0; }
        .lmm-live { display:inline-flex; align-items:center; gap:6px; font-size:.7rem; font-weight:600; color:var(--ok); letter-spacing:.06em; padding:2px 8px; border-radius:20px; background:#a6e3a118; border:1px solid #a6e3a130; }
        .lmm-live .pulse { width:6px; height:6px; border-radius:50%; background:var(--ok); animation:lmm-pulse 2s ease-in-out infinite; }
        @keyframes lmm-pulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--ok)} 50%{opacity:.4;box-shadow:none} }
        .lmm-ts { margin-left:auto; font-size:.72rem; color:var(--muted); }

        /* Sections (matches bmad_method) */
        .section { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:14px; overflow:hidden; }
        .section-head { padding:10px 16px; background:var(--color-bg,#1e1e2e); border-bottom:1px solid var(--border);
                        display:flex; align-items:center; gap:10px; }
        .section-title { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--info);
                         display:flex; align-items:center; gap:8px; }
        .section-title svg { flex-shrink:0; }
        .section-meta { margin-left:auto; font-size:.72rem; color:var(--muted); }
        .section-body { padding:14px 16px; }

        /* Compute grid */
        .compute-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
        .compute-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
        .compute-card-hdr { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
        .compute-card-title { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
        .compute-badge { margin-left:auto; font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.04em; }
        .badge-ok   { background:#a6e3a120; color:var(--ok);   border:1px solid #a6e3a140; }
        .badge-warn { background:#f9e2af20; color:var(--warn); border:1px solid #f9e2af40; }
        .badge-err  { background:#f38ba820; color:var(--err);  border:1px solid #f38ba840; }
        .badge-info { background:#89b4fa20; color:var(--info); border:1px solid #89b4fa40; }

        /* Bars */
        .bar-wrap { background:var(--color-bg,#1e1e2e); border:1px solid var(--border); border-radius:6px; height:16px; overflow:hidden; position:relative; margin:4px 0; }
        .bar-fill { height:100%; transition:width .4s ease; }
        .bar-fill.ok   { background:var(--ok); }
        .bar-fill.warn { background:var(--warn); }
        .bar-fill.err  { background:var(--err); }
        .bar-label { position:absolute; right:8px; top:0; line-height:16px; font-size:.7rem; font-weight:700; color:var(--color-fg,#cdd6f4); }

        /* Stat rows */
        .stat-row { display:flex; justify-content:space-between; align-items:center; font-size:.78rem; padding:3px 0; }
        .stat-key { color:var(--muted); }
        .stat-val { color:var(--color-fg,#cdd6f4); font-weight:600; }

        /* Slot list */
        .slot-item { display:grid; grid-template-columns:auto 1fr auto auto; gap:10px; align-items:center;
                     padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
        .slot-item.broken { border-color:#f38ba860; }
        .slot-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .slot-dot.on   { background:var(--ok);   box-shadow:0 0 6px #a6e3a180; }
        .slot-dot.warn { background:var(--warn); }
        .slot-dot.off  { background:var(--border-soft); }
        .slot-name { font-size:.88rem; font-weight:600; color:var(--color-fg,#cdd6f4); }
        .slot-meta { font-size:.72rem; color:var(--muted); font-family:'SF Mono','Menlo','Consolas',monospace; }
        .slot-status { font-size:.72rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
        .slot-btns { display:flex; gap:4px; }

        /* Buttons — modeled on A0 `.button.confirm/.cancel` */
        .btn { font-family:inherit; font-size:.76rem; font-weight:600; padding:5px 12px; border-radius:6px;
               border:1px solid transparent; cursor:pointer; transition:all .15s; white-space:nowrap; display:inline-flex; align-items:center; gap:5px; }
        .btn:disabled { opacity:.5; cursor:not-allowed; }
        .btn-confirm { background:#a6e3a120; color:var(--ok);   border-color:#a6e3a160; }
        .btn-confirm:hover:not(:disabled) { background:#a6e3a135; border-color:var(--ok); }
        .btn-cancel  { background:#f38ba820; color:var(--err);  border-color:#f38ba860; }
        .btn-cancel:hover:not(:disabled) { background:#f38ba835; border-color:var(--err); }
        .btn-primary { background:#89b4fa20; color:var(--info); border-color:#89b4fa60; }
        .btn-primary:hover:not(:disabled) { background:#89b4fa35; border-color:var(--info); }
        .btn-accent  { background:#cba6f720; color:var(--accent); border-color:#cba6f760; }
        .btn-accent:hover:not(:disabled) { background:#cba6f735; border-color:var(--accent); }
        .btn-ghost   { background:transparent; color:var(--soft); border-color:var(--border); }
        .btn-ghost:hover:not(:disabled) { color:var(--color-fg,#cdd6f4); border-color:var(--info); }

        .btn-row { display:flex; gap:6px; flex-wrap:wrap; }

        /* Recommendations */
        .rec-item { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center;
                    padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
        .rec-name { font-size:.85rem; font-weight:600; color:var(--color-fg,#cdd6f4); }
        .rec-detail { font-size:.72rem; color:var(--muted); margin-top:2px; }
        .rec-badge { font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.04em; }
        .rec-badge.installed { background:#a6e3a120; color:var(--ok); border:1px solid #a6e3a140; }
        .rec-badge.new       { background:#89b4fa20; color:var(--info); border:1px solid #89b4fa40; }

        /* Hardware-aware picks (local-llm-recommender skill) */
        .hw-hdr-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; padding:8px 12px;
                      background:var(--surface2); border:1px solid var(--border); border-radius:8px; font-size:.72rem; }
        .hw-hdr-row .hw-pill { background:var(--color-bg,#1e1e2e); border:1px solid var(--border); padding:2px 8px; border-radius:20px; color:var(--soft); }
        .hw-hdr-row .hw-pill b { color:var(--color-fg,#cdd6f4); font-weight:600; }
        .hw-hdr-row .hw-tier { background:#cba6f720; border:1px solid #cba6f760; color:var(--accent); font-weight:700; padding:2px 10px; border-radius:20px; }
        .hw-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:10px; }
        .hw-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; position:relative; }
        .hw-card.comfortable { border-left:3px solid var(--ok); }
        .hw-card.balanced    { border-left:3px solid var(--info); }
        .hw-card.stretch     { border-left:3px solid var(--warn); }
        .hw-card.empty       { border-left:3px solid var(--border-soft); opacity:.7; }
        .hw-card-label { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
        .hw-card.comfortable .hw-card-label { color:var(--ok); }
        .hw-card.balanced    .hw-card-label { color:var(--info); }
        .hw-card.stretch     .hw-card-label { color:var(--warn); }
        .hw-card-name { font-size:.92rem; font-weight:700; color:var(--color-fg,#cdd6f4); margin-bottom:4px; }
        .hw-card-meta { font-size:.7rem; color:var(--muted); margin-bottom:8px; font-family:'SF Mono','Menlo','Consolas',monospace; }
        .hw-card-reason { font-size:.76rem; color:var(--soft); margin-bottom:10px; line-height:1.4; }
        .hw-card-install { font-size:.7rem; background:var(--color-bg,#1e1e2e); border:1px solid var(--border); border-radius:6px;
                           padding:6px 8px; font-family:'SF Mono','Menlo','Consolas',monospace; color:#cdd6f4; word-break:break-all;
                           display:flex; justify-content:space-between; align-items:center; gap:6px; }
        .hw-card-install code { flex:1; background:transparent; padding:0; border:0; font-size:.7rem; }
        .hw-card-install button { font-size:.62rem; padding:3px 8px; }
        .hw-card-warn { margin-top:8px; font-size:.7rem; padding:6px 8px; border-radius:6px;
                        background:#f9e2af15; color:var(--warn); border:1px solid #f9e2af40; }
        .hw-score { display:inline-block; font-size:.62rem; font-weight:700; padding:1px 7px; border-radius:20px;
                    background:#cba6f720; color:var(--accent); border:1px solid #cba6f740; margin-left:6px; vertical-align:middle; }
        .hw-speed { display:inline-block; font-size:.62rem; font-weight:700; padding:1px 7px; border-radius:20px; margin-left:4px; vertical-align:middle; }
        .hw-speed.fast    { background:#a6e3a120; color:var(--ok);   border:1px solid #a6e3a140; }
        .hw-speed.usable  { background:#89b4fa20; color:var(--info); border:1px solid #89b4fa40; }
        .hw-speed.slow    { background:#f9e2af20; color:var(--warn); border:1px solid #f9e2af40; }
        .hw-speed.painful { background:#f38ba820; color:var(--err);  border:1px solid #f38ba840; }
        .hw-notes { margin-top:12px; padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
                    font-size:.72rem; color:var(--soft); line-height:1.5; }
        .hw-notes ul { margin:4px 0 0 0; padding-left:18px; }
        .hw-notes li { margin-bottom:2px; }
        .hw-empty-card { text-align:center; padding:14px 12px; color:var(--muted); font-size:.76rem; line-height:1.5; }
        .hw-snapshot { font-size:.62rem; color:var(--muted); font-style:italic; margin-left:auto; }
        .hw-source { font-size:.62rem; padding:1px 7px; border-radius:20px; background:#11111b; border:1px solid var(--border); color:var(--muted); }

        /* Per-slot suggestions (slot_recommender) */
        .slot-item-wrap { margin-bottom:6px; }
        .slot-suggested { background:var(--surface2); border:1px solid var(--border); border-top:0; border-radius:0 0 8px 8px;
                          margin-top:-1px; padding:8px 12px 10px; }
        .slot-suggested-hdr { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:.7rem; }
        .slot-suggested-title { color:var(--accent); font-weight:600; letter-spacing:.02em; }
        .slot-fit-badge { font-size:.6rem; font-weight:700; padding:1px 7px; border-radius:20px; letter-spacing:.06em; }
        .slot-fit-badge.fit-optimal    { background:#a6e3a120; color:var(--ok);   border:1px solid #a6e3a140; }
        .slot-fit-badge.fit-fits       { background:#89b4fa20; color:var(--info); border:1px solid #89b4fa40; }
        .slot-fit-badge.fit-undersized { background:#f9e2af20; color:var(--warn); border:1px solid #f9e2af40; }
        .slot-fit-badge.fit-oversized  { background:#f38ba820; color:var(--err);  border:1px solid #f38ba840; }
        .slot-fit-badge.fit-empty      { background:transparent; color:var(--muted); border:1px solid var(--border); }
        .slot-suggested-row { display:flex; align-items:center; gap:10px; padding:5px 0; border-top:1px dashed var(--border); }
        .slot-suggested-row:first-of-type { border-top:0; }
        .ssr-info { display:flex; align-items:center; gap:6px; flex-wrap:wrap; flex:1; min-width:0; }
        .ssr-name { font-size:.78rem; font-weight:600; color:var(--color-fg,#cdd6f4); }
        .ssr-meta { font-size:.68rem; color:var(--muted); font-family:'SF Mono','Menlo','Consolas',monospace; }
        .ssr-actions { flex-shrink:0; }
        .ssr-download { display:flex; align-items:center; gap:4px; }
        .ssr-cmd { font-size:.62rem; background:var(--color-bg,#1e1e2e); border:1px solid var(--border); border-radius:5px;
                   padding:3px 6px; color:#cdd6f4; font-family:'SF Mono','Menlo','Consolas',monospace; max-width:280px;
                   overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .ssr-download .btn { padding:3px 6px; font-size:.62rem; }

        /* Slot model selector */
        .slot-model-row { display:flex; gap:8px; align-items:center; margin-top:6px; }
        .slot-model-select {
          background:var(--surface); border:1px solid var(--border); border-radius:6px;
          color:var(--color-fg,#cdd6f4); font-size:.76rem; padding:4px 8px;
          min-width:200px;
        }
        .slot-model-select:focus { outline:none; border-color:var(--info); }
        .slot-assign-btn { font-size:.7rem; padding:3px 10px; }
        .slot-swap-spinner {
          display:inline-flex; align-items:center; gap:6px; font-size:.7rem; color:var(--info);
        }
        .spin { animation:spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        /* Unified Load Panel */
        .slot-load-panel { margin-top:6px; }
        .slot-load-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .slot-ctx-input {
          background:var(--surface); border:1px solid var(--border); border-radius:6px;
          color:var(--color-fg,#cdd6f4); font-size:.72rem; padding:4px 6px; width:100px;
          font-family:'SF Mono','Menlo','Consolas',monospace;
        }
        .slot-ctx-input:focus { outline:none; border-color:var(--accent); }
        .slot-ctx-input::placeholder { color:var(--muted); font-family:inherit; }

        /* Context Window Slider */
        .ctx-slider-wrap { margin-top:8px; padding:8px 0 4px; }
        .ctx-slider-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .ctx-slider-label { font-size:.68rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
        .ctx-slider-value { font-size:.76rem; font-weight:700; font-family:'SF Mono','Menlo','Consolas',monospace; }
        .ctx-slider { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px;
                      background:var(--color-bg,#1e1e2e); border:1px solid var(--border); outline:none; }
        .ctx-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:16px; height:16px;
                                             border-radius:50%; background:var(--slider-color, var(--ok));
                                             border:2px solid var(--surface); cursor:pointer;
                                             box-shadow:0 0 6px color-mix(in srgb, var(--slider-color, var(--ok)) 40%, transparent); }
        .ctx-slider::-moz-range-thumb { width:16px; height:16px; border-radius:50%;
                                        background:var(--slider-color, var(--ok)); border:2px solid var(--surface);
                                        cursor:pointer; }
        .ctx-slider-footer { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
        .ctx-slider-min, .ctx-slider-max { font-size:.6rem; color:var(--muted); }
        .ctx-slider-est { font-size:.66rem; font-weight:600;
                          font-family:'SF Mono','Menlo','Consolas',monospace; }

        /* Install form */
        .install-form { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .install-input {
          background:var(--surface); border:1px solid var(--border); border-radius:6px;
          color:var(--color-fg,#cdd6f4); font-size:.76rem; padding:6px 10px;
          min-width:180px;
        }
        .install-input:focus { outline:none; border-color:var(--info); }
        .install-progress { font-size:.72rem; color:var(--muted); }
        .install-bar-wrap { width:100%; height:4px; background:var(--border); border-radius:2px; margin-top:4px; }
        .install-bar-fill { height:100%; background:var(--ok); border-radius:2px; transition:width .3s; }

        /* Messages */
        .lmm-msg { font-size:.8rem; padding:10px 14px; border-radius:8px; margin-bottom:12px; line-height:1.45; }
        .lmm-msg.err   { background:#f38ba815; color:var(--err);  border:1px solid #f38ba840; }
        .lmm-msg.warn  { background:#f9e2af15; color:var(--warn); border:1px solid #f9e2af40; }
        .lmm-msg.info  { background:#89b4fa15; color:var(--info); border:1px solid #89b4fa40; }
        .lmm-msg.ok    { background:#a6e3a115; color:var(--ok);   border:1px solid #a6e3a140; }
        .lmm-msg code { background:var(--color-bg,#1e1e2e); padding:1px 6px; border-radius:4px; border:1px solid var(--border);
                        font-family:'SF Mono','Menlo','Consolas',monospace; font-size:.72rem; }

        .empty-state { text-align:center; padding:20px; color:var(--muted); font-size:.85rem; }

        /* VRAM Budget Visualizer */
        .vram-stacked-wrap { margin-bottom:12px; }
        .vram-stacked-label { font-size:.72rem; color:var(--muted); margin-bottom:6px; font-weight:600; }
        .vram-stacked-bar { display:flex; height:28px; border-radius:6px; overflow:hidden; border:1px solid var(--border);
                            background:var(--color-bg,#1e1e2e); }
        .vram-seg { display:flex; align-items:center; justify-content:center; min-width:2px;
                    transition:width .5s ease; position:relative; cursor:default; }
        .vram-seg-text { font-size:.62rem; font-weight:700; color:#11111b; white-space:nowrap; padding:0 4px;
                         text-shadow:0 0 2px rgba(255,255,255,.3); }
        .vram-seg-free { background:var(--surface2) !important; }
        .vram-seg-free .vram-seg-text { color:var(--muted); text-shadow:none; }
        .vram-warn-badge { margin-top:6px; font-size:.7rem; padding:4px 10px; border-radius:6px;
                           background:#f38ba815; color:var(--err); border:1px solid #f38ba840; font-weight:600; }
        .vram-breakdown { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:4px; margin-top:8px; }
        .vram-row { display:flex; align-items:center; gap:8px; font-size:.74rem; padding:3px 6px;
                    border-radius:4px; transition:background .15s; }
        .vram-row:hover { background:var(--surface2); }
        .vram-row-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
        .vram-row-label { flex:1; color:var(--soft); }
        .vram-row-val { color:var(--color-fg,#cdd6f4); font-weight:600; font-family:'SF Mono','Menlo','Consolas',monospace; font-size:.7rem; }
        .vram-row-pct { color:var(--muted); font-size:.66rem; min-width:30px; text-align:right; }
        .vram-row-free { opacity:.7; }

        /* Model Library Cards */
        .model-cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
        .model-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px;
                      transition:border-color .2s, box-shadow .2s; }
        .model-card:hover { border-color:var(--border-soft); box-shadow:0 2px 12px rgba(0,0,0,.3); }
        .model-card-assigned { border-left:3px solid var(--accent); }
        .model-card-hdr { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .model-card-name { font-size:.82rem; font-weight:700; color:var(--color-fg,#cdd6f4); overflow:hidden;
                           text-overflow:ellipsis; white-space:nowrap; flex:1; }
        .model-card-slot-badge { font-size:.6rem; font-weight:700; padding:2px 8px; border-radius:20px;
                                  border:1px solid; white-space:nowrap; }
        .model-card-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
        .model-card-tag, .model-card-size, .model-card-quant {
          font-size:.62rem; font-weight:600; padding:1px 7px; border-radius:20px;
          background:var(--color-bg,#1e1e2e); border:1px solid var(--border); color:var(--soft);
        }
        .model-card-ctx, .model-card-arch { display:flex; justify-content:space-between; font-size:.74rem; padding:2px 0; }
        .model-card-path { font-size:.62rem; color:var(--muted); margin-top:6px; overflow:hidden;
                           text-overflow:ellipsis; white-space:nowrap;
                           font-family:'SF Mono','Menlo','Consolas',monospace; }
      </style>

      <div class="lmm-dash">

        <!-- Header -->
        <div class="lmm-hdr">
          <div class="lmm-hdr-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#cba6f7" stroke-width="1.5">
              <rect x="1" y="4" width="22" height="16" rx="3"/>
              <path d="M6 9h3v7H6zM11 7h3v9h-3zM16 11h3v5h-3z" fill="#cba6f7" fill-opacity=".25" stroke="none"/>
              <path d="M6 9v7M9 9v7M11 7v9M14 7v9M16 11v5M19 11v5" stroke-linecap="round"/>
            </svg>
            <h1>LMM Router</h1>
          </div>
          <div class="lmm-live"><div class="pulse"></div><span>LIVE</span></div>
          <a class="btn btn-ghost" href="/usr/plugins/a0_lmm_router/webui/model-test.html" target="_blank"
             style="margin-left:10px; text-decoration:none;"
             title="Send a test prompt to any slot and inspect reasoning_content / timings">
            🧪 Model Test
          </a>
          <div class="lmm-ts" x-text="'Updated ' + timeAgo()"></div>
        </div>

        <!-- Top-level messages -->
        <template x-if="error">
          <div class="lmm-msg err" x-text="error"></div>
        </template>
        <template x-if="loading && !error">
          <div class="lmm-msg info">Loading compute stats…</div>
        </template>

        <!-- ─── Compute section ──────────────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 2v4M18 2v4M6 18v4M18 18v4"/></svg>
              Compute
            </div>
            <!-- Live tier chip: derived from live compute_monitor data on every poll -->
            <template x-if="liveTier.tier">
              <span class="hw-tier" :title="'EIM ' + liveTier.eim_gb + ' GB (' + liveTier.eim_basis + ')'"
                    x-text="'Tier ' + liveTier.tier"></span>
            </template>
            <div class="section-meta" x-text="hasGPU ? (gpus.length + ' GPU' + (gpus.length===1?'':'s')) : 'CPU only'"></div>
          </div>
          <div class="section-body">
            <div class="compute-grid">

              <!-- GPU cards -->
              <template x-for="gpu in gpus" :key="gpu.id">
                <div class="compute-card">
                  <div class="compute-card-hdr">
                    <span class="compute-card-title" x-text="'GPU ' + gpu.id"></span>
                    <span class="compute-badge"
                          :class="gpu.utilization_pct > 80 ? 'badge-err' : gpu.utilization_pct > 40 ? 'badge-warn' : 'badge-ok'"
                          x-text="gpu.utilization_pct + '% util'"></span>
                  </div>
                  <div class="stat-row">
                    <span class="stat-key" x-text="gpu.name"></span>
                    <span class="stat-val" x-text="gpu.temperature_c + '°C'"></span>
                  </div>
                  <div style="margin-top:8px">
                    <div class="stat-row">
                      <span class="stat-key">VRAM</span>
                      <span class="stat-val" x-text="fmtMB(gpu.used_vram_mb) + ' / ' + fmtMB(gpu.total_vram_mb)"></span>
                    </div>
                    <div class="bar-wrap">
                      <div class="bar-fill" :class="vramPct(gpu) > 85 ? 'err' : vramPct(gpu) > 60 ? 'warn' : 'ok'"
                           :style="'width:' + vramPct(gpu) + '%'"></div>
                      <span class="bar-label" x-text="vramPct(gpu) + '%'"></span>
                    </div>
                  </div>
                </div>
              </template>

              <!-- No-GPU fallback -->
              <template x-if="!hasGPU && !loading">
                <div class="compute-card">
                  <div class="compute-card-hdr">
                    <span class="compute-card-title">GPU</span>
                    <span class="compute-badge badge-warn">unavailable</span>
                  </div>
                  <div style="font-size:.78rem;color:var(--muted)">No GPU detected (nvidia-smi unavailable)</div>
                </div>
              </template>

              <!-- CPU / RAM card -->
              <div class="compute-card">
                <div class="compute-card-hdr">
                  <span class="compute-card-title">CPU / RAM</span>
                  <span class="compute-badge badge-info" x-text="cpu.load_pct.toFixed(0) + '% cpu'"></span>
                </div>
                <div class="stat-row">
                  <span class="stat-key">RAM</span>
                  <span class="stat-val" x-text="fmtMB(cpu.ram_used_mb) + ' / ' + fmtMB(cpu.ram_total_mb)"></span>
                </div>
                <div class="bar-wrap">
                  <div class="bar-fill" :class="ramPct() > 85 ? 'err' : ramPct() > 60 ? 'warn' : 'ok'"
                       :style="'width:' + ramPct() + '%'"></div>
                  <span class="bar-label" x-text="ramPct() + '%'"></span>
                </div>
                <div class="stat-row" style="margin-top:4px">
                  <span class="stat-key">Free</span>
                  <span class="stat-val" x-text="fmtMB(cpu.ram_free_mb)"></span>
                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- ─── VRAM Budget Visualizer ────────────────────────── -->
        <template x-if="hasGPU">
          <div class="section">
            <div class="section-head">
              <div class="section-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/><path d="M12 4v16"/></svg>
                VRAM Budget
              </div>
              <div class="section-meta" x-text="vramBudget.freeGB + ' GB free'"></div>
            </div>
            <div class="section-body">
              <!-- Stacked bar -->
              <div class="vram-stacked-wrap">
                <div class="vram-stacked-label" x-text="gpus[0]?.name + ' — ' + fmtMB(gpus[0]?.total_vram_mb)"></div>
                <div class="vram-stacked-bar">
                  <template x-for="seg in vramBudget.segments" :key="seg.label">
                    <div class="vram-seg"
                         :style="'width:' + seg.pct + '%;background:' + seg.color"
                         :title="seg.label + ': ' + seg.gb.toFixed(1) + ' GB'"
                         x-show="seg.pct > 0.5">
                      <span class="vram-seg-text" x-show="seg.pct > 8" x-text="seg.short"></span>
                    </div>
                  </template>
                  <div class="vram-seg vram-seg-free"
                       :style="'width:' + vramBudget.freePct + '%'"
                       :title="'Free: ' + vramBudget.freeGB + ' GB'">
                    <span class="vram-seg-text" x-show="vramBudget.freePct > 8"
                          x-text="vramBudget.freeGB + ' GB free'"></span>
                  </div>
                </div>
                <!-- Warning badge -->
                <template x-if="vramBudget.usedPct > 90">
                  <div class="vram-warn-badge">⚠ VRAM usage above 90% — risk of OOM</div>
                </template>
              </div>
              <!-- Breakdown table -->
              <div class="vram-breakdown">
                <template x-for="seg in vramBudget.segments" :key="seg.label">
                  <div class="vram-row">
                    <span class="vram-row-dot" :style="'background:' + seg.color"></span>
                    <span class="vram-row-label" x-text="seg.label"></span>
                    <span class="vram-row-val" x-text="seg.gb.toFixed(1) + ' GB'"></span>
                    <span class="vram-row-pct" x-text="seg.pct.toFixed(0) + '%'"></span>
                  </div>
                </template>
                <div class="vram-row vram-row-free">
                  <span class="vram-row-dot" style="background:var(--border-soft)"></span>
                  <span class="vram-row-label">Free</span>
                  <span class="vram-row-val" x-text="vramBudget.freeGB + ' GB'"></span>
                  <span class="vram-row-pct" x-text="vramBudget.freePct.toFixed(0) + '%'"></span>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- ─── Slots section ────────────────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
              llama.cpp Slots
            </div>
            <div class="section-meta" x-text="runningSlots + ' / ' + totalSlots + ' running'"></div>
            <button class="btn btn-accent"
                    @click="igniteFleet()"
                    :disabled="igniteState === 'pending'"
                    x-text="igniteState === 'pending' ? 'Checking…' : igniteState === 'ok' ? '✓ Fleet Healthy' : 'Verify Fleet'"
                    title="Probe every configured slot and tell you what to do next"></button>
          </div>
          <div class="section-body">

            <!-- Host-side ignition row -->
            <div class="btn-row" style="margin-bottom:10px">
              <button class="btn btn-confirm" @click="hostAction('run-bat')"  :disabled="igniteState === 'pending'"
                      title="Launch start_agent_zero.bat on the Windows host (detached)">▶ Run BAT</button>
              <button class="btn btn-confirm" @click="hostAction('ignite')"    :disabled="igniteState === 'pending'"
                      title="docker compose up -d via host helper">⚡ Ignite Fleet</button>
              <button class="btn btn-cancel"  @click="hostAction('extinguish')" :disabled="igniteState === 'pending'"
                      title="docker compose down via host helper">⏻ Extinguish</button>
              <button class="btn btn-ghost"   @click="hostAction('health')"    :disabled="igniteState === 'pending'"
                      title="Ping the host helper to check it's running">♥ Helper Health</button>
            </div>

            <!-- Ignite result banner -->
            <template x-if="igniteState !== 'idle'">
              <div class="lmm-msg"
                   :class="igniteState === 'ok' ? 'ok' : igniteState === 'error' ? 'err' : 'info'">
                <div x-text="igniteMessage"></div>
                <template x-if="igniteHostHint">
                  <div style="font-size:.72rem;margin-top:6px;opacity:.85">
                    Run on the host: <code x-text="igniteHostHint"></code>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="slots.length === 0 && !loading">
              <div class="empty-state">No llama.cpp slots configured yet.</div>
            </template>

            <template x-for="s in slots" :key="s.id">
              <div class="slot-item-wrap">
                <div class="slot-item" :class="(s.running && !s.healthy) ? 'broken' : ''">
                  <div class="slot-dot" :class="s.running ? (s.healthy ? 'on' : 'warn') : 'off'"></div>
                  <div style="min-width:0">
                    <div class="slot-name" x-text="s.id"></div>
                    <div class="slot-meta" x-text="s.role + (s.model_id ? ' · ' + s.model_id : '') + (s.port ? ' · :' + s.port : '')"></div>

                    <!-- Unified Load Panel (inspired by lmstudio-js client.llm.load()) -->
                    <div class="slot-load-panel" x-show="!swapInProgress[s.id]">
                      <div class="slot-load-row">
                        <select class="slot-model-select"
                                x-model="s.selectedModelId"
                                @change="s.selectedModelId = $event.target.value">
                          <option value="">-- Select model --</option>
                          <template x-for="opt in getSlotModelOptions(s.role)" :key="opt.id">
                            <option :value="opt.id" x-text="opt.label" :selected="opt.id === getSlotCurrentModelId(s)"></option>
                          </template>
                        </select>
                        <input type="number" class="slot-ctx-input"
                               :placeholder="'ctx: auto'"
                               x-model.number="s._ctxOverride"
                               min="2048" step="2048"
                               title="Context window override (leave empty for auto-calculation)"/>
                        <button class="btn btn-primary slot-assign-btn"
                                @click="const mid = s.selectedModelId || getSlotCurrentModelId(s); if (mid) assignModelToSlot(s.id, mid)"
                                :disabled="!s.selectedModelId || s.selectedModelId === getSlotCurrentModelId(s)"
                                title="Load model into this slot with auto-calculated context">
                          ⚡ Load
                        </button>
                      </div>
                    </div>

                    <!-- Context Window Slider (inspired by LM Studio) -->
                    <template x-if="s.selectedModelId || getSlotCurrentModelId(s)">
                      <div class="ctx-slider-wrap">
                        <div class="ctx-slider-header">
                          <span class="ctx-slider-label">Context Window</span>
                          <span class="ctx-slider-value"
                                :style="'color:' + ctxVramColor(s.selectedModelId || getSlotCurrentModelId(s), s._ctxSlider || 8192)"
                                x-text="((s._ctxSlider || 8192) / 1024).toFixed(0) + 'K tokens'"></span>
                        </div>
                        <input type="range" class="ctx-slider"
                               min="2048" :max="(installedModels[s.selectedModelId || getSlotCurrentModelId(s)]?.n_ctx_train || 131072)" step="2048"
                               :value="s._ctxSlider || 8192"
                               @input="s._ctxSlider = parseInt($event.target.value)"
                               :style="'--slider-color:' + ctxVramColor(s.selectedModelId || getSlotCurrentModelId(s), s._ctxSlider || 8192)"/>
                        <div class="ctx-slider-footer">
                          <span class="ctx-slider-min">2K</span>
                          <span class="ctx-slider-est"
                                :style="'color:' + ctxVramColor(s.selectedModelId || getSlotCurrentModelId(s), s._ctxSlider || 8192)"
                                x-text="'KV cache: ~' + estimateKVCacheGB(s.selectedModelId || getSlotCurrentModelId(s), s._ctxSlider || 8192).toFixed(1) + ' GB'"></span>
                          <span class="ctx-slider-max" x-text="((installedModels[s.selectedModelId || getSlotCurrentModelId(s)]?.n_ctx_train || 131072) / 1024).toFixed(0) + 'K'"></span>
                        </div>
                      </div>
                    </template>

                    <!-- Swap in progress indicator -->
                    <div class="slot-swap-spinner" x-show="swapInProgress[s.id]">
                      <span class="spin">⟳</span>
                      <span>Loading model + calculating context…</span>
                    </div>
                  </div>

                  <span class="slot-status"
                        :style="'color:' + (s.running ? (s.healthy ? 'var(--ok)' : 'var(--warn)') : 'var(--muted)')"
                        x-text="s.running ? (s.healthy ? 'healthy' : 'unhealthy') : 'stopped'"></span>
                  <div class="slot-btns">
                    <button class="btn btn-confirm" x-show="!s.running" @click="controlSlot('start', s.id)" :disabled="swapInProgress[s.id]">Start</button>
                    <button class="btn btn-cancel"  x-show="s.running"  @click="controlSlot('stop', s.id)" :disabled="swapInProgress[s.id]">Unload</button>
                  </div>
                </div>

                <!-- ⚡ Per-slot suggestions (role-aware, tier-aware) -->
                <template x-if="slotSuggestions[s.id] && slotSuggestions[s.id].suggestions && slotSuggestions[s.id].suggestions.length">
                  <div class="slot-suggested">
                    <div class="slot-suggested-hdr">
                      <span class="slot-suggested-title"
                            x-text="'⚡ Better for ' + s.role + ' @ ' + (liveTier.tier || '?')"></span>
                      <span class="slot-fit-badge" :class="'fit-' + (slotSuggestions[s.id].current_status || 'EMPTY').toLowerCase()"
                            x-text="slotSuggestions[s.id].current_status"
                            :title="slotSuggestions[s.id].current_status_reason"></span>
                    </div>
                    <template x-for="sug in slotSuggestions[s.id].suggestions" :key="sug.name">
                      <div class="slot-suggested-row">
                        <div class="ssr-info">
                          <span class="ssr-name" x-text="sug.name"></span>
                          <template x-if="sug.aa_score !== null && sug.aa_score !== undefined">
                            <span class="hw-score" x-text="'AA ' + sug.aa_score"></span>
                          </template>
                          <span class="hw-speed" :class="(sug.speed_class || 'fast').toLowerCase()"
                                x-text="sug.speed_class"></span>
                          <span class="ssr-meta" x-text="sug.quant + ' · ~' + sug.size_gb + ' GB'"></span>
                        </div>
                        <div class="ssr-actions">
                          <template x-if="sug.source === 'installed'">
                            <button class="btn btn-confirm slot-assign-btn"
                                    @click="assignModelToSlot(s.id, sug.model_id)"
                                    :disabled="swapInProgress[s.id]"
                                    x-text="'Assign ' + sug.model_id">
                            </button>
                          </template>
                          <template x-if="sug.source === 'download'">
                            <div class="ssr-download">
                              <code class="ssr-cmd" x-text="sug.install"></code>
                              <button class="btn btn-ghost slot-assign-btn" @click="copyInstall(sug.install)" title="Copy install command">📋</button>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <div class="btn-row" style="margin-top:10px">
              <button class="btn btn-confirm" @click="controlSlot('start_all')">Start All</button>
              <button class="btn btn-cancel"  @click="controlSlot('stop_all')">Stop All</button>
              <button class="btn btn-ghost"   @click="refresh()">Refresh</button>
            </div>
          </div>
        </div>

        <!-- ─── Model Library ──────────────────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-8l-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/></svg>
              Model Library
            </div>
            <div class="section-meta" x-text="Object.keys(installedModels).length + ' models'"></div>
          </div>
          <div class="section-body">
            <template x-if="Object.keys(installedModels).length === 0">
              <div class="empty-state">No models installed yet. Use the HuggingFace download form below to install models.</div>
            </template>
            <div class="model-cards-grid">
              <template x-for="[mid, m] in Object.entries(installedModels)" :key="mid">
                <div class="model-card" :class="m.assigned_slot ? 'model-card-assigned' : ''">
                  <div class="model-card-hdr">
                    <span class="model-card-name" x-text="mid.split('/').pop()"></span>
                    <template x-if="m.assigned_slot">
                      <span class="model-card-slot-badge"
                            :style="'background:' + (_slotColors[m.assigned_slot] || '#6c7086') + '30; color:' + (_slotColors[m.assigned_slot] || '#6c7086') + '; border-color:' + (_slotColors[m.assigned_slot] || '#6c7086') + '60'"
                            x-text="'⬤ ' + m.assigned_slot"></span>
                    </template>
                  </div>
                  <div class="model-card-meta">
                    <span class="model-card-tag" x-text="m.role || 'general'"></span>
                    <span class="model-card-size" x-text="(m.size_gb || '?') + ' GB'"></span>
                    <template x-if="m.quant">
                      <span class="model-card-quant" x-text="m.quant"></span>
                    </template>
                  </div>
                  <template x-if="m.n_ctx_train">
                    <div class="model-card-ctx">
                      <span class="stat-key">Max context</span>
                      <span class="stat-val" x-text="(m.n_ctx_train / 1024).toFixed(0) + 'K'"></span>
                    </div>
                  </template>
                  <template x-if="m.n_layer && m.n_embd">
                    <div class="model-card-arch">
                      <span class="stat-key">Architecture</span>
                      <span class="stat-val" x-text="m.n_layer + 'L × ' + m.n_embd + 'D'"></span>
                    </div>
                  </template>
                  <div class="model-card-path" :title="m.path || mid" x-text="(m.path || mid).split('/').slice(-2).join('/')"></div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- ─── Advanced: General hardware picks (collapsible) ─── -->
        <details class="section adv-picks">
          <summary class="section-head" style="cursor:pointer;">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
              Advanced — General Hardware Picks
            </div>
            <span class="section-meta">3-tier Comfortable / Balanced / Stretch view (full-host scan)</span>
          </summary>
          <div class="section-body">
            <div style="font-size:.72rem; color:var(--muted); margin-bottom:10px;">
              For role-agnostic "what fits my whole machine" recommendations.
              Per-slot picks live above inside each slot card.
            </div>
            <button class="btn btn-accent" :disabled="hw.loading"
                    @click="scanHardware()"
                    x-text="hw.loading ? 'Scanning…' : (hw.tier ? 'Re-scan host' : 'Scan host')"></button>
            <template x-if="hw.snapshot">
              <span class="hw-snapshot" style="margin-left:10px" x-text="'snapshot ' + hw.snapshot"></span>
            </template>
            <template x-if="hw.source">
              <span class="hw-source" style="margin-left:6px" x-text="hw.source === 'host_helper' ? 'host helper' : hw.source === 'local' ? 'local probe' : hw.source"></span>
            </template>

            <template x-if="hw.error">
              <div class="lmm-msg err" style="margin-top:10px;">
                <b>Hardware scan failed:</b> <span x-text="hw.error"></span>
                <div style="margin-top:6px; font-size:.7rem; opacity:.85;">
                  Needs the host helper running on the host (port 55501).
                </div>
              </div>
            </template>

            <template x-if="hw.tier && !hw.loading">
              <div style="margin-top:12px;">
                <div class="hw-hdr-row">
                  <span class="hw-pill">OS: <b x-text="hw.os_name + ' ' + (hw.os_version || '')"></b></span>
                  <span class="hw-pill">CPU: <b x-text="hw.cpu_name || '—'"></b></span>
                  <span class="hw-pill" x-show="hw.gpu_label">GPU: <b x-text="hw.gpu_label"></b></span>
                  <span class="hw-pill">RAM: <b x-text="hw.ram_gb + ' GB'"></b></span>
                  <span class="hw-pill">Free disk: <b x-text="hw.disk_free_gb + ' GB'"></b></span>
                  <span class="hw-pill">EIM: <b x-text="hw.eim_gb + ' GB (' + hw.eim_basis + ')'"></b></span>
                  <span class="hw-tier" x-text="'Tier ' + hw.tier"></span>
                </div>

                <div class="hw-grid">
                  <template x-if="hw.picks.comfortable">
                    <div class="hw-card comfortable">
                      <div class="hw-card-label">⚡ Comfortable</div>
                      <div class="hw-card-name">
                        <span x-text="hw.picks.comfortable.name"></span>
                        <template x-if="hw.picks.comfortable.aa_score !== null && hw.picks.comfortable.aa_score !== undefined">
                          <span class="hw-score" x-text="'AA ' + hw.picks.comfortable.aa_score"></span>
                        </template>
                        <span class="hw-speed" :class="hw.picks.comfortable.speed_class.toLowerCase()" x-text="hw.picks.comfortable.speed_class"></span>
                      </div>
                      <div class="hw-card-meta" x-text="hw.picks.comfortable.quant + ' · ~' + hw.picks.comfortable.size_gb + ' GB · ' + (hw.picks.comfortable.active_params_b ? hw.picks.comfortable.params_b + 'B-A' + hw.picks.comfortable.active_params_b + 'B MoE' : hw.picks.comfortable.params_b + 'B dense')"></div>
                      <div class="hw-card-reason" x-text="hw.picks.comfortable.reason"></div>
                      <div class="hw-card-install">
                        <code x-text="hw.picks.comfortable.install"></code>
                        <button class="btn btn-ghost" @click="copyInstall(hw.picks.comfortable.install)" title="Copy command">📋</button>
                      </div>
                    </div>
                  </template>
                  <template x-if="hw.picks.balanced">
                    <div class="hw-card balanced">
                      <div class="hw-card-label">★ Balanced</div>
                      <div class="hw-card-name">
                        <span x-text="hw.picks.balanced.name"></span>
                        <template x-if="hw.picks.balanced.aa_score !== null && hw.picks.balanced.aa_score !== undefined">
                          <span class="hw-score" x-text="'AA ' + hw.picks.balanced.aa_score"></span>
                        </template>
                        <span class="hw-speed" :class="hw.picks.balanced.speed_class.toLowerCase()" x-text="hw.picks.balanced.speed_class"></span>
                      </div>
                      <div class="hw-card-meta" x-text="hw.picks.balanced.quant + ' · ~' + hw.picks.balanced.size_gb + ' GB · ' + (hw.picks.balanced.active_params_b ? hw.picks.balanced.params_b + 'B-A' + hw.picks.balanced.active_params_b + 'B MoE' : hw.picks.balanced.params_b + 'B dense')"></div>
                      <div class="hw-card-reason" x-text="hw.picks.balanced.reason"></div>
                      <div class="hw-card-install">
                        <code x-text="hw.picks.balanced.install"></code>
                        <button class="btn btn-ghost" @click="copyInstall(hw.picks.balanced.install)" title="Copy command">📋</button>
                      </div>
                    </div>
                  </template>
                  <template x-if="hw.picks.stretch">
                    <div class="hw-card stretch">
                      <div class="hw-card-label">↑ Stretch</div>
                      <div class="hw-card-name">
                        <span x-text="hw.picks.stretch.name"></span>
                        <template x-if="hw.picks.stretch.aa_score !== null && hw.picks.stretch.aa_score !== undefined">
                          <span class="hw-score" x-text="'AA ' + hw.picks.stretch.aa_score"></span>
                        </template>
                        <span class="hw-speed" :class="hw.picks.stretch.speed_class.toLowerCase()" x-text="hw.picks.stretch.speed_class"></span>
                      </div>
                      <div class="hw-card-meta" x-text="hw.picks.stretch.quant + ' · ~' + hw.picks.stretch.size_gb + ' GB · ' + (hw.picks.stretch.active_params_b ? hw.picks.stretch.params_b + 'B-A' + hw.picks.stretch.active_params_b + 'B MoE' : hw.picks.stretch.params_b + 'B dense')"></div>
                      <div class="hw-card-reason" x-text="hw.picks.stretch.reason"></div>
                      <div class="hw-card-install">
                        <code x-text="hw.picks.stretch.install"></code>
                        <button class="btn btn-ghost" @click="copyInstall(hw.picks.stretch.install)" title="Copy command">📋</button>
                      </div>
                    </div>
                  </template>
                </div>

                <template x-if="hw.notes && hw.notes.length">
                  <div class="hw-notes">
                    <b>Notes:</b>
                    <ul>
                      <template x-for="(n, i) in hw.notes" :key="i">
                        <li x-text="n"></li>
                      </template>
                    </ul>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </details>

        <!-- ─── Stats section ────────────────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
              Usage Stats
            </div>
            <div class="btn-row" style="margin-left:auto">
              <button class="btn btn-ghost" :class="statsWindow==='24h'?'btn-primary':''" @click="setStatsWindow('24h')">24h</button>
              <button class="btn btn-ghost" :class="statsWindow==='7d'?'btn-primary':''" @click="setStatsWindow('7d')">7d</button>
              <button class="btn btn-ghost" :class="statsWindow==='30d'?'btn-primary':''" @click="setStatsWindow('30d')">30d</button>
            </div>
          </div>
          <div class="section-body">
            <div class="compute-grid">
              <!-- Savings card -->
              <div class="compute-card">
                <div class="compute-card-hdr">
                  <span class="compute-card-title">Savings</span>
                  <span class="compute-badge badge-ok" x-text="'$' + stats.total_savings_window.toFixed(2) + ' saved'"></span>
                </div>
                <div class="stat-row">
                  <span class="stat-key">Total Requests</span>
                  <span class="stat-val" x-text="stats.total_requests_window.toLocaleString()"></span>
                </div>
                <div class="stat-row">
                  <span class="stat-key">All-Time Savings</span>
                  <span class="stat-val" x-text="'$' + stats.total_savings_usd.toFixed(2)"></span>
                </div>
                <div class="stat-row" style="margin-top:4px">
                  <span class="stat-key">Tokens</span>
                  <span class="stat-val" x-text="(stats.total_tokens_input + stats.total_tokens_output).toLocaleString() + ' total'"></span>
                </div>
              </div>

              <!-- Failover card -->
              <div class="compute-card">
                <div class="compute-card-hdr">
                  <span class="compute-card-title">Failover</span>
                  <span class="compute-badge" :class="stats.failovers.total > 0 ? 'badge-warn' : 'badge-ok'" x-text="stats.failovers.total + ' events'"></span>
                </div>
                <template x-if="stats.failovers.total > 0">
                  <div>
                    <div class="stat-row">
                      <span class="stat-key">Last Event</span>
                      <span class="stat-val" x-text="stats.failovers.last_at ? new Date(stats.failovers.last_at).toLocaleString() : '—'"></span>
                    </div>
                    <div class="stat-row" style="margin-top:4px">
                      <span class="stat-key">By Reason</span>
                    </div>
                    <template x-for="(count, reason) in stats.failovers.by_reason" :key="reason">
                      <div style="font-size:.72rem;color:var(--muted);padding-left:8px">
                        <span x-text="reason + ': ' + count"></span>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="stats.failovers.total === 0">
                  <div style="font-size:.78rem;color:var(--muted)">No failover events recorded</div>
                </template>
              </div>

              <!-- Slot usage card -->
              <div class="compute-card">
                <div class="compute-card-hdr">
                  <span class="compute-card-title">Slot Usage</span>
                  <span class="compute-badge badge-info" x-text="stats.slots.length + ' tracked'"></span>
                </div>
                <template x-for="slot in stats.slots.slice(0, 3)" :key="slot.slot_id">
                  <div style="margin-bottom:6px">
                    <div class="stat-row">
                      <span class="stat-key" x-text="slot.slot_id"></span>
                      <span class="stat-val" x-text="slot.requests.toLocaleString() + ' req'"></span>
                    </div>
                    <div style="font-size:.68rem;color:var(--muted)">
                      <span x-text="'avg ' + Math.round(slot.avg_latency_ms) + 'ms'"></span>
                      <span x-show="slot.last_used"> · last <span x-text="timeAgoShort(slot.last_used)"></span></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Hourly distribution mini-chart -->
            <div style="margin-top:14px">
              <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px">Hourly Request Distribution (Last 24h)</div>
              <div style="display:flex;align-items:flex-end;height:40px;gap:2px">
                <template x-for="(count, hour) in stats.hourly_distribution" :key="hour">
                  <div style="flex:1;background:var(--info);border-radius:2px 2px 0 0;opacity:0.8"
                       :style="'height:' + Math.max((count / Math.max(...stats.hourly_distribution)) * 100, 5) + '%;background:' + (count > 0 ? 'var(--info)' : 'var(--border-soft)')">
                  </div>
                </template>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-top:2px">
                <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:00</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ─── Installed Models section ─────────────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
              Installed Models
            </div>
            <div class="section-meta" x-text="Object.keys(installedModels).length + ' models'"></div>
            <button class="btn btn-ghost" style="margin-left:auto" @click="_fetchInstalledModels()">Refresh</button>
          </div>
          <div class="section-body">
            <template x-if="Object.keys(installedModels).length === 0 && !loading">
              <div>
                <div class="empty-state">No models installed yet.</div>
                <template x-if="installedDiag">
                  <div class="lmm-msg warn" style="margin-top:8px;">
                    <b>Diagnostic:</b>
                    <ul style="margin:6px 0 0 18px; padding:0; font-size:.72rem;">
                      <li>Host helper reachable: <b x-text="installedDiag.host_reachable ? 'yes' : 'NO — start lmm_host_helper.py on the host'"></b></li>
                      <template x-if="installedDiag.scanned_dir">
                        <li>Scanned dir on host: <code x-text="installedDiag.scanned_dir"></code></li>
                      </template>
                      <li x-text="installedDiag.message"></li>
                    </ul>
                  </div>
                </template>
              </div>
            </template>

            <template x-for="[id, m] in Object.entries(installedModels).slice(0, 10)" :key="id">
              <div class="rec-item">
                <div>
                  <div class="rec-name" x-text="id"></div>
                  <div class="rec-detail" x-text="(m.size_gb || '?') + ' GB · ' + (m.role_hint || 'utility') + (m.repo_id && m.repo_id !== 'local' ? ' · ' + m.repo_id : '')"></div>
                </div>
                <span class="rec-badge installed">INSTALLED</span>
              </div>
            </template>
          </div>
        </div>

        <!-- ─── Install from HuggingFace section ─────────────── -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
              Install Model
            </div>
            <span style="font-size:.7rem;color:var(--muted);margin-left:8px">Download GGUF from HuggingFace</span>
          </div>
          <div class="section-body">
            <div class="install-form">
              <input type="text" class="install-input" x-model="installForm.repo" placeholder="Repo ID (e.g. unsloth/Llama-3.2-3B-Instruct)" style="flex:1;min-width:260px">
              <input type="text" class="install-input" x-model="installForm.file" placeholder="Filename (e.g. Llama-3.2-3B-Instruct-Q4_K_M.gguf)" style="flex:1;min-width:260px">
              <select class="install-input" x-model="installForm.role" style="width:auto">
                <option value="">Role (auto)</option>
                <option value="chat">chat</option>
                <option value="utility">utility</option>
                <option value="embedding">embedding</option>
                <option value="vision">vision</option>
              </select>
              <button class="btn btn-accent" @click="installFromForm()" :disabled="!installForm.repo || !installForm.file || installForm.installing">
                <span x-show="!installForm.installing">Download</span>
                <span x-show="installForm.installing">Downloading…</span>
              </button>
            </div>

            <!-- Progress bar for form install -->
            <template x-if="installForm.installing && installForm.progress !== null">
              <div style="margin-top:8px">
                <div class="install-bar-wrap">
                  <div class="install-bar-fill" :style="'width:' + installForm.progress + '%'"></div>
                </div>
                <div class="install-progress" x-text="installForm.progress.toFixed(1) + '% — ' + installForm.status"></div>
              </div>
            </template>
            <div x-show="installForm.error" class="lmm-msg err" style="margin-top:8px" x-text="installForm.error"></div>
            <div x-show="installForm.success" class="lmm-msg ok" style="margin-top:8px" x-text="installForm.success"></div>
          </div>
        </div>

        <!-- (Hardware-Aware Picks moved to collapsible <details> at the bottom; live tier now
             shown as a chip in the Compute section header. Per-slot recommendations live
             inside each slot card in the LLAMA.CPP SLOTS section.) -->

        <!-- ─── Recommendations section ──────────────────────── -->
        <div class="section" x-show="recommendations.length > 0">
          <div class="section-head">
            <div class="section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              Legacy Recommendations
            </div>
            <button class="btn btn-ghost" style="margin-left:auto" @click="_fetchRecommendations()">Refresh</button>
          </div>
          <div class="section-body">

            <template x-if="recommendations.length === 0 && !loading">
              <div class="empty-state">No recommendations available.</div>
            </template>

            <template x-for="rec in recommendations" :key="rec.filename">
              <div class="rec-item">
                <div>
                  <div class="rec-name" x-text="rec.name"></div>
                  <div class="rec-detail" x-text="rec.size_gb + ' GB · ' + rec.quant + ' · ' + rec.role + ' · ' + rec.reason"></div>
                </div>
                <span class="rec-badge" :class="rec.already_installed ? 'installed' : 'new'"
                      x-text="rec.already_installed ? 'INSTALLED' : 'NEW'"></span>
                <template x-if="!rec.already_installed">
                  <button class="btn btn-accent"
                          :disabled="installStatus[rec.filename] && installStatus[rec.filename].status === 'downloading'"
                          @click="installModel(rec)"
                          x-text="installStatus[rec.filename] && installStatus[rec.filename].status === 'downloading' ? 'Downloading… ' + (installStatus[rec.filename].percent || 0).toFixed(0) + '%' : installStatus[rec.filename] && installStatus[rec.filename].status === 'done' ? 'Done' : installStatus[rec.filename] && installStatus[rec.filename].status === 'error' ? 'Failed' : 'Install'">
                  </button>
                </template>
              </div>
            </template>
          </div>
        </div>

      </div><!-- /lmm-dash -->
    </div>
  </template>
</div>

<script src="/usr/plugins/a0_lmm_router/webui/js/dashboard-store.js"></script>
