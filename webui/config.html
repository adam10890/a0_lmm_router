<!-- a0_lmm_router config panel — llama.cpp server manager -->
<div x-data>
  <template x-if="$store.pluginSettingsPrototype">
    <div x-data="lmmConfig()" x-init="init()" style="font-family:'JetBrains Mono',monospace;background:#0a0e17;min-height:100%;padding:20px;color:#c9d1d9;">

      <style>
        .lmm-root { --green:#39d353; --amber:#e3b341; --red:#f85149; --blue:#58a6ff; --dim:#8b949e; --border:#21262d; --surface:#161b22; --surface2:#0d1117; }
        .lmm-root * { box-sizing:border-box; }
        .lmm-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #21262d; }
        .lmm-header h2 { font-size:15px; font-weight:700; color:#e6edf3; letter-spacing:.5px; margin:0; }
        .lmm-badge { font-size:10px; padding:2px 8px; border-radius:3px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
        .lmm-badge.active { background:#39d35320; color:#39d353; border:1px solid #39d35340; }
        .lmm-badge.inactive { background:#8b949e20; color:#8b949e; border:1px solid #8b949e30; }
        .lmm-section { margin-bottom:20px; }
        .lmm-section-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#8b949e; margin-bottom:10px; }
        .lmm-card { background:#161b22; border:1px solid #21262d; border-radius:6px; padding:14px; margin-bottom:8px; }
        .lmm-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
        .lmm-label { font-size:12px; color:#8b949e; }
        .lmm-value { font-size:12px; color:#e6edf3; text-align:right; max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .lmm-input { background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#e6edf3; font-family:inherit; font-size:12px; padding:6px 10px; width:100%; outline:none; transition:border-color .15s; }
        .lmm-input:focus { border-color:#58a6ff; }
        .lmm-btn { font-family:inherit; font-size:11px; font-weight:600; letter-spacing:.5px; padding:6px 14px; border-radius:4px; border:none; cursor:pointer; transition:all .15s; }
        .lmm-btn-green { background:#39d35320; color:#39d353; border:1px solid #39d35340; }
        .lmm-btn-green:hover { background:#39d35335; }
        .lmm-btn-red { background:#f8514920; color:#f85149; border:1px solid #f8514940; }
        .lmm-btn-red:hover { background:#f8514930; }
        .lmm-btn-blue { background:#58a6ff20; color:#58a6ff; border:1px solid #58a6ff40; }
        .lmm-btn-blue:hover { background:#58a6ff30; }
        .lmm-btn-dim { background:#21262d; color:#8b949e; border:1px solid #30363d; }
        .lmm-btn-dim:hover { color:#e6edf3; border-color:#58a6ff; }
        .slot-row { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:10px; padding:10px 14px; background:#0d1117; border:1px solid #21262d; border-radius:5px; margin-bottom:6px; }
        .slot-name { font-size:12px; color:#e6edf3; }
        .slot-port { font-size:11px; color:#8b949e; }
        .slot-status { display:flex; align-items:center; gap:5px; font-size:11px; }
        .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .dot-green { background:#39d353; box-shadow:0 0 4px #39d35380; }
        .dot-amber { background:#e3b341; }
        .dot-red { background:#f85149; }
        .dot-dim { background:#30363d; }
        .model-row { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:#0d1117; border:1px solid #21262d; border-radius:4px; margin-bottom:4px; }
        .model-name { font-size:12px; color:#e6edf3; }
        .model-size { font-size:11px; color:#8b949e; }
        .lmm-msg { font-size:11px; padding:8px 12px; border-radius:4px; margin-top:8px; }
        .lmm-msg.ok { background:#39d35315; color:#39d353; border:1px solid #39d35330; }
        .lmm-msg.err { background:#f8514915; color:#f85149; border:1px solid #f8514930; }
        .lmm-msg.info { background:#58a6ff15; color:#58a6ff; border:1px solid #58a6ff30; }
        .lmm-divider { border:none; border-top:1px solid #21262d; margin:16px 0; }
        .lmm-toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
        .lmm-toggle input { opacity:0; width:0; height:0; }
        .lmm-toggle-track { position:absolute; inset:0; border-radius:10px; background:#21262d; border:1px solid #30363d; cursor:pointer; transition:.2s; }
        .lmm-toggle input:checked + .lmm-toggle-track { background:#39d35330; border-color:#39d35360; }
        .lmm-toggle-thumb { position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#8b949e; transition:.2s; pointer-events:none; }
        .lmm-toggle input:checked ~ .lmm-toggle-thumb { left:18px; background:#39d353; }
      </style>

      <div class="lmm-root">

        <!-- Header -->
        <div class="lmm-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8l2 2-2 2M11 12h4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <h2>llama.cpp Server Manager</h2>
          <span class="lmm-badge" :class="anyRunning ? 'active' : 'inactive'" x-text="anyRunning ? 'RUNNING' : 'IDLE'"></span>
          <button class="lmm-btn lmm-btn-blue" style="margin-left:auto;font-size:10px;letter-spacing:1px"
                  @click="openModal('/plugins/a0_lmm_router/webui/dashboard.html')">
            DASHBOARD
          </button>
          <button class="lmm-btn lmm-btn-blue" style="font-size:10px;letter-spacing:1px;opacity:.7"
                  @click="openModal('/plugins/a0_lmm_router/webui/dev-tracker.html')">
            DEV STATUS
          </button>
          <span style="font-size:11px;color:#8b949e" x-text="statusMsg"></span>
        </div>

        <!-- Active Slots -->
        <div class="lmm-section">
          <div class="lmm-section-title">Active Slots</div>
          <template x-if="slots.length === 0">
            <div class="lmm-msg info">No slots configured. Check conf/llama_cpp_servers.yaml.</div>
          </template>
          <template x-for="slot in slots" :key="slot.id">
            <div class="slot-row">
              <div>
                <div class="slot-name" x-text="slot.id"></div>
                <div class="slot-port" x-text="'port ' + slot.port + ' · ' + slot.role + (slot.model_id ? ' · ' + slot.model_id : '')"></div>
              </div>
              <div class="slot-status">
                <div class="dot" :class="slot.running ? 'dot-green' : (slot.enabled === false ? 'dot-dim' : 'dot-red')"></div>
                <span :style="'color:' + (slot.running ? '#39d353' : (slot.enabled === false ? '#8b949e' : '#f85149'))"
                      x-text="slot.running ? 'running' : (slot.enabled === false ? 'disabled' : 'stopped')"></span>
              </div>
              <div style="display:flex;gap:6px">
                <button class="lmm-btn lmm-btn-green" x-show="!slot.running && slot.enabled !== false" @click="startSlot(slot.id)">START</button>
                <button class="lmm-btn lmm-btn-red" x-show="slot.running" @click="stopSlot(slot.id)">STOP</button>
              </div>
            </div>
          </template>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="lmm-btn lmm-btn-green" @click="startAll()">▶ Start All</button>
            <button class="lmm-btn lmm-btn-red" @click="stopAll()">■ Stop All</button>
            <button class="lmm-btn lmm-btn-dim" @click="refreshStatus()">↻ Refresh</button>
          </div>
          <div class="lmm-msg" :class="actionMsg.type" x-show="actionMsg.text" x-text="actionMsg.text"></div>
        </div>

        <hr class="lmm-divider">

        <!-- Available Models -->
        <div class="lmm-section">
          <div class="lmm-row" style="margin-bottom:10px">
            <div class="lmm-section-title" style="margin:0">Available .gguf Models</div>
            <button class="lmm-btn lmm-btn-dim" @click="loadModels()">Scan</button>
          </div>
          <template x-if="models.length === 0 && modelsDir">
            <div class="lmm-msg info" x-text="'No .gguf files found in: ' + modelsDir"></div>
          </template>
          <template x-for="m in models" :key="m.name">
            <div class="model-row">
              <span class="model-name" x-text="m.name"></span>
              <span class="model-size" x-text="m.size_gb + ' GB'"></span>
            </div>
          </template>
        </div>

        <hr class="lmm-divider">

        <!-- Fleet Status -->
        <div class="lmm-section">
          <div class="lmm-section-title">Fleet Status</div>
          <div class="lmm-card">
            <div class="lmm-row">
              <div class="lmm-label">Host Helper</div>
              <div class="lmm-value" x-text="fleetStatus.host_helper || 'unknown'"></div>
            </div>
            <div class="lmm-row" style="margin-top:8px">
              <div class="lmm-label">Llama.cpp Image</div>
              <div class="lmm-value" x-text="fleetStatus.image_version || 'unknown'"></div>
            </div>
            <div class="lmm-row" style="margin-top:8px">
              <div class="lmm-label">HF Token</div>
              <div class="lmm-value" :style="hfTokenConfigured ? 'color:#39d353' : 'color:#f85149'" x-text="hfTokenConfigured ? 'Configured' : 'Not configured'"></div>
            </div>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="lmm-btn lmm-btn-dim" @click="refreshFleetStatus()">↻ Refresh</button>
            <button class="lmm-btn lmm-btn-blue" @click="showHfTokenModal = true">HF Token</button>
            <button class="lmm-btn lmm-btn-green" @click="showInstallModal = true">+ Install Model</button>
          </div>
        </div>

        <hr class="lmm-divider">

        <!-- Model Management -->
        <div class="lmm-section">
          <div class="lmm-row" style="margin-bottom:10px">
            <div class="lmm-section-title" style="margin:0">Fleet Models</div>
            <button class="lmm-btn lmm-btn-dim" @click="loadModels()">Scan</button>
          </div>
          <template x-if="models.length === 0">
            <div class="lmm-msg info">No models found in fleet. Install a model to get started.</div>
          </template>
          <template x-for="m in models" :key="m.id">
            <div class="model-row">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px">
                  <span class="model-name" x-text="m.name || m.id"></span>
                  <span class="lmm-badge" x-show="m.pending_assignment" style="font-size:9px;padding:1px 6px;background:#e3b34120;color:#e3b341;border:1px solid #e3b34140">PENDING</span>
                </div>
                <div style="font-size:10px;color:#8b949e" x-text="m.role || 'unassigned'"></div>
              </div>
              <span class="model-size" x-text="m.size_gb ? m.size_gb + ' GB' : ''"></span>
              <div style="display:flex;gap:6px;margin-left:8px">
                <button class="lmm-btn lmm-btn-blue" style="padding:4px 8px;font-size:10px" @click="assignModel(m.id)" x-disabled="m.pending_assignment">Assign</button>
                <button class="lmm-btn lmm-btn-red" style="padding:4px 8px;font-size:10px" @click="deleteModel(m.id)" x-disabled="m.pending_assignment">Delete</button>
              </div>
            </div>
          </template>
        </div>

        <hr class="lmm-divider">

        <!-- Active Jobs -->
        <div class="lmm-section" x-show="activeJobs.length > 0">
          <div class="lmm-section-title">Active Jobs</div>
          <template x-for="job in activeJobs" :key="job.id">
            <div class="lmm-card">
              <div class="lmm-row">
                <div class="lmm-label" x-text="job.repo_id + ' / ' + job.filename"></div>
                <div class="lmm-value" x-text="job.status"></div>
              </div>
              <div class="lmm-row" style="margin-top:8px" x-show="job.progress">
                <div class="lmm-label">Progress</div>
                <div class="lmm-value" x-text="job.progress + '%'"></div>
              </div>
              <div style="margin-top:8px">
                <button class="lmm-btn lmm-btn-red" @click="cancelJob(job.id)">Cancel</button>
              </div>
            </div>
          </template>
        </div>

        <hr class="lmm-divider">

        <!-- Fleet Upgrade -->
        <div class="lmm-section">
          <div class="lmm-section-title">Fleet Upgrade</div>
          <div class="lmm-card">
            <div class="lmm-label" style="margin-bottom:8px">Pull latest llama.cpp image and restart fleet services.</div>
            <div style="display:flex;gap:8px">
              <button class="lmm-btn lmm-btn-green" @click="fleetUpgrade()">Upgrade</button>
              <button class="lmm-btn lmm-btn-dim" @click="fleetUpgradeRollback()">Rollback</button>
            </div>
          </div>
        </div>

        <!-- HF Token Modal -->
        <div x-show="showHfTokenModal" style="position:fixed;inset:0;background:#00000080;display:flex;align-items:center;justify-content:center;z-index:1000">
          <div class="lmm-card" style="max-width:400px;width:90%">
            <h3 style="font-size:14px;margin:0 0 15px 0;color:#e6edf3">HuggingFace Token</h3>
            <div style="margin-bottom:10px">
              <input class="lmm-input" type="password" x-model="hfTokenInput" placeholder="Enter HF token">
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button class="lmm-btn lmm-btn-dim" @click="showHfTokenModal = false">Cancel</button>
              <button class="lmm-btn lmm-btn-blue" @click="setHfToken()">Set Token</button>
              <button class="lmm-btn lmm-btn-red" @click="clearHfToken()">Clear</button>
            </div>
          </div>
        </div>

        <!-- Install Model Modal -->
        <div x-show="showInstallModal" style="position:fixed;inset:0;background:#00000080;display:flex;align-items:center;justify-content:center;z-index:1000">
          <div class="lmm-card" style="max-width:500px;width:90%;max-height:80vh;overflow-y:auto">
            <h3 style="font-size:14px;margin:0 0 15px 0;color:#e6edf3">Install Model</h3>
            <div style="margin-bottom:10px">
              <input class="lmm-input" type="text" x-model="installRepo" placeholder="HuggingFace repo (e.g. meta-llama/Llama-3.2-3B-Instruct)" style="margin-bottom:8px">
              <input class="lmm-input" type="text" x-model="installFilename" placeholder="GGUF filename (e.g. Llama-3.2-3B-Instruct-Q4_K_M.gguf)" style="margin-bottom:8px">
              <select class="lmm-input" x-model="installRole">
                <option value="">No role</option>
                <option value="chat">Chat</option>
                <option value="utility">Utility</option>
                <option value="embed">Embedding</option>
              </select>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button class="lmm-btn lmm-btn-dim" @click="showInstallModal = false">Cancel</button>
              <button class="lmm-btn lmm-btn-green" @click="installModel()">Install</button>
            </div>
          </div>
        </div>

      </div><!-- /lmm-root -->
    </div>
  </template>
</div>

<script type="module">
function lmmConfig() {
  return {
    context: null,
    slots: [],
    models: [],
    fleetStatus: {},
    hfTokenConfigured: false,
    activeJobs: [],
    anyRunning: false,
    statusMsg: '',
    actionMsg: { text: '', type: 'info' },
    showHfTokenModal: false,
    showInstallModal: false,
    hfTokenInput: '',
    installRepo: '',
    installFilename: '',
    installRole: '',

    init() {
      this.context = Alpine.store('pluginSettingsPrototype');
      this.refreshStatus();
      this.refreshFleetStatus();
      this.pollJobs();
    },

    async refreshStatus() {
      this.statusMsg = 'checking...';
      try {
        const r = await fetch('/plugins/a0_lmm_router/llamacpp_list_models', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d = await r.json();
        if (d.ok) {
          this.modelsDir = d.models_dir || '';
          this.models = d.models || [];
        }
      } catch (_) {}

      try {
        const r2 = await fetch('/plugins/a0_lmm_router/lmm_compute_stats', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d2 = await r2.json();
        if (d2.ok) {
          this.slots = (d2.slots || []).map(s => ({
            id: s.id || s.name,
            port: s.port,
            role: s.role,
            model_id: s.model_id || s.model,
            running: s.healthy === true || s.running === true,
            enabled: s.enabled !== false,
          }));
          this.anyRunning = this.slots.some(s => s.running);
          this.statusMsg = this.anyRunning ? `${this.slots.filter(s=>s.running).length} slot(s) running` : 'all stopped';
        } else {
          this.statusMsg = 'status unavailable';
          this.slots = [];
        }
      } catch (_) {
        this.statusMsg = 'manager offline';
      }
    },

    async loadModels() {
      try {
        const r = await fetch('/plugins/a0_lmm_router/llamacpp_list_models', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d = await r.json();
        if (d.ok) { this.models = d.models || []; }
      } catch (_) {}
    },

    async startSlot(id) {
      await this._control('start', id);
    },
    async stopSlot(id) {
      await this._control('stop', id);
    },
    async startAll() {
      await this._control('start_all');
    },
    async stopAll() {
      await this._control('stop_all');
    },

    async _control(op, server) {
      this.actionMsg = { text: `${op}${server ? ' ' + server : ''}...`, type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/llamacpp_control', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ data: { operation: op, server } })
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'OK' : 'Error'), type: d.ok ? 'ok' : 'err' };
        await this.refreshStatus();
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async refreshFleetStatus() {
      try {
        const r = await fetch('/plugins/a0_lmm_router/fleet_status', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d = await r.json();
        if (d.ok) {
          this.fleetStatus = d.fleet_status || {};
          this.hfTokenConfigured = d.hf_token_configured || false;
        }
      } catch (_) {}
    },

    async setHfToken() {
      if (!this.hfTokenInput) return;
      this.actionMsg = { text: 'Setting HF token...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/set_hf_token', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({ token: this.hfTokenInput })
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'HF token set' : 'Error'), type: d.ok ? 'ok' : 'err' };
        if (d.ok) {
          this.showHfTokenModal = false;
          this.hfTokenInput = '';
          this.refreshFleetStatus();
        }
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async clearHfToken() {
      this.actionMsg = { text: 'Clearing HF token...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/clear_hf_token', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'HF token cleared' : 'Error'), type: d.ok ? 'ok' : 'err' };
        if (d.ok) {
          this.showHfTokenModal = false;
          this.refreshFleetStatus();
        }
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async installModel() {
      if (!this.installRepo || !this.installFilename) return;
      this.actionMsg = { text: 'Starting model installation...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/lmm_model_install', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({
            repo_id: this.installRepo,
            filename: this.installFilename,
            role: this.installRole || null
          })
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'Installation started' : 'Error'), type: d.ok ? 'ok' : 'err' };
        if (d.ok) {
          this.showInstallModal = false;
          if (d.job_id) {
            this.activeJobs.push({
              id: d.job_id,
              repo_id: this.installRepo,
              filename: this.installFilename,
              status: 'queued',
              progress: 0
            });
          }
          this.installRepo = '';
          this.installFilename = '';
          this.installRole = '';
          this.refreshFleetStatus();
        }
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async deleteModel(modelId) {
      if (!confirm('Delete this model?')) return;
      this.actionMsg = { text: 'Deleting model...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/delete_model', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({ model_id: modelId })
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'Model deleted' : 'Error'), type: d.ok ? 'ok' : 'err' };
        if (d.ok) {
          this.loadModels();
          this.refreshFleetStatus();
        }
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async assignModel(modelId) {
      const slot = prompt('Assign to slot (chat/utility/embed):');
      if (!slot) return;
      this.actionMsg = { text: 'Assigning model...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/assign_model', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({ slot, model_id: modelId, apply_now: true })
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'Model assigned' : 'Error'), type: d.ok ? 'ok' : 'err' };
        if (d.ok) {
          this.loadModels();
          this.refreshFleetStatus();
        }
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async fleetUpgrade() {
      if (!confirm('Upgrade llama.cpp image and restart fleet?')) return;
      this.actionMsg = { text: 'Starting fleet upgrade...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/fleet_upgrade', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'Fleet upgrade started' : 'Error'), type: d.ok ? 'ok' : 'err' };
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async fleetUpgradeRollback() {
      if (!confirm('Rollback to previous llama.cpp image?')) return;
      this.actionMsg = { text: 'Rolling back fleet...', type: 'info' };
      try {
        const r = await fetch('/plugins/a0_lmm_router/fleet_upgrade_rollback', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({})
        });
        const d = await r.json();
        this.actionMsg = { text: d.message || (d.ok ? 'Rollback started' : 'Error'), type: d.ok ? 'ok' : 'err' };
      } catch (e) {
        this.actionMsg = { text: 'Request failed: ' + e.message, type: 'err' };
      }
    },

    async pollJobs() {
      setInterval(async () => {
        if (this.activeJobs.length > 0) {
          await this.refreshJobs();
        }
      }, 2000);
    },

    async refreshJobs() {
      try {
        const jobIds = this.activeJobs.map(j => j.id);
        const jobs = [];
        for (const jobId of jobIds) {
          const r = await fetch(`/plugins/a0_lmm_router/job_status?job_id=${jobId}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin', body: JSON.stringify({})
          });
          const d = await r.json();
          if (d.ok && d.job) {
            if (d.job.status === 'completed' || d.job.status === 'failed' || d.job.status === 'cancelled') {
              continue;
            }
            jobs.push(d.job);
          }
        }
        const hadJobs = this.activeJobs.length > 0;
        this.activeJobs = jobs;
        if (jobs.length === 0 && hadJobs) {
          this.loadModels();
          this.refreshFleetStatus();
        }
      } catch (_) {}
    },

    async cancelJob(jobId) {
      try {
        const r = await fetch('/plugins/a0_lmm_router/cancel_job', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify({ job_id: jobId })
        });
        const d = await r.json();
        if (d.ok) {
          this.activeJobs = this.activeJobs.filter(j => j.id !== jobId);
        }
      } catch (_) {}
    },
  };
}
window.lmmConfig = lmmConfig;
</script>
