<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a0_lmm_router — Dev Tracker</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body style="margin:0;padding:0">
<!-- a0_lmm_router DEV TRACKER — development status radiator -->
<div x-data="devTracker()" x-init="init()" style="font-family:'IBM Plex Mono','JetBrains Mono','Fira Code',monospace;background:#04080d;min-height:100vh;padding:0;color:#a8b5c4;">

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;500;700;900&display=swap');

:root {
  --ok: #00e676; --warn: #ffc400; --err: #ff3d00; --info: #40c4ff;
  --done: #00e676; --wip: #ffc400; --todo: #546e7a; --block: #ff3d00;
  --bg0: #04080d; --bg1: #0a1018; --bg2: #111a24; --bg3: #1a2636;
  --border: #1e2d3d; --text: #a8b5c4; --bright: #e0e8f0;
  --accent: #00e676; --accent2: #40c4ff; --accent3: #ffc400;
}

.dt * { box-sizing: border-box; margin: 0; padding: 0; }
.dt { background: var(--bg0); }

/* ─── HEADER ─── */
.dt-hero {
  position: relative;
  padding: 32px 28px 24px;
  background: linear-gradient(180deg, #0a1820 0%, var(--bg0) 100%);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.dt-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,230,118,.015) 3px, rgba(0,230,118,.015) 4px);
  pointer-events: none;
}
.dt-hero-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 20px;
}
.dt-title-wrap { display: flex; flex-direction: column; gap: 4px; }
.dt-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  opacity: .7;
}
.dt-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -.5px;
  color: var(--bright);
  line-height: 1.1;
}
.dt-subtitle {
  font-size: 11px;
  color: #5a7080;
  margin-top: 4px;
  max-width: 500px;
  line-height: 1.4;
}
.dt-meta-block {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.dt-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
}
.dt-meta-label { color: #3d5566; text-transform: uppercase; letter-spacing: 1px; }
.dt-meta-val { color: var(--bright); font-weight: 600; }
.dt-version {
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 3px;
  background: rgba(0,230,118,.1);
  color: var(--accent);
  font-weight: 700;
  border: 1px solid rgba(0,230,118,.2);
  letter-spacing: .5px;
}

/* ─── PROGRESS OVERVIEW BAR ─── */
.dt-progress-strip {
  display: flex;
  height: 32px;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.dt-progress-strip .seg {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: flex .6s ease;
  white-space: nowrap;
  padding: 0 8px;
}
.seg-done { background: rgba(0,230,118,.12); color: var(--done); }
.seg-wip  { background: rgba(255,196,0,.12); color: var(--wip); }
.seg-todo { background: rgba(84,110,122,.1); color: var(--todo); }
.seg-block { background: rgba(255,61,0,.1); color: var(--block); }

/* ─── BODY ─── */
.dt-body { padding: 20px 28px 40px; }

/* ─── SECTION ─── */
.dt-section { margin-bottom: 28px; }
.dt-section-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.dt-section-icon {
  width: 14px; height: 14px;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.dt-section-title {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--bright);
}
.dt-section-count {
  margin-left: auto;
  font-size: 10px;
  color: #3d5566;
}

/* ─── PHASE CARDS ─── */
.dt-phases { display: flex; flex-direction: column; gap: 6px; }
.dt-phase {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 5px;
  transition: all .15s;
}
.dt-phase:hover { border-color: #2a3e50; background: var(--bg2); }
.dt-phase-num {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: #1e2d3d;
  text-align: center;
  line-height: 1;
}
.dt-phase-num.done { color: var(--done); }
.dt-phase-num.wip { color: var(--wip); }
.dt-phase-info { display: flex; flex-direction: column; gap: 2px; }
.dt-phase-name { font-size: 12px; color: var(--bright); font-weight: 600; }
.dt-phase-desc { font-size: 10px; color: #4a6070; line-height: 1.3; }
.dt-phase-files { font-size: 9px; color: #3d5566; font-style: italic; }
.dt-tag {
  font-size: 8px;
  padding: 2px 8px;
  border-radius: 2px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}
.dt-tag-done  { background: rgba(0,230,118,.1); color: var(--done); border: 1px solid rgba(0,230,118,.2); }
.dt-tag-wip   { background: rgba(255,196,0,.1); color: var(--wip); border: 1px solid rgba(255,196,0,.2); }
.dt-tag-todo  { background: rgba(84,110,122,.1); color: var(--todo); border: 1px solid rgba(84,110,122,.2); }
.dt-tag-block { background: rgba(255,61,0,.1); color: var(--block); border: 1px solid rgba(255,61,0,.2); }
.dt-priority {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 2px;
  font-weight: 600;
}
.dt-p-crit { background: rgba(255,61,0,.1); color: var(--err); }
.dt-p-high { background: rgba(255,196,0,.1); color: var(--warn); }
.dt-p-med  { background: rgba(64,196,255,.08); color: var(--info); }
.dt-p-low  { background: rgba(84,110,122,.1); color: var(--todo); }

/* ─── FILE INVENTORY ─── */
.dt-files { display: flex; flex-direction: column; gap: 4px; }
.dt-file-row {
  display: grid;
  grid-template-columns: 18px 1fr auto auto;
  gap: 8px;
  align-items: center;
  padding: 5px 10px;
  font-size: 11px;
  border-radius: 3px;
  background: var(--bg1);
  border: 1px solid transparent;
}
.dt-file-row:hover { border-color: var(--border); }
.dt-file-icon { font-size: 10px; text-align: center; }
.dt-file-path { color: #6a8899; }
.dt-file-path b { color: var(--bright); font-weight: 600; }
.dt-file-status { font-size: 9px; font-weight: 700; letter-spacing: .5px; }

/* ─── BUG TRACKER ─── */
.dt-bugs { display: flex; flex-direction: column; gap: 6px; }
.dt-bug {
  display: grid;
  grid-template-columns: 24px 1fr auto auto;
  gap: 10px;
  align-items: start;
  padding: 10px 14px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 5px;
}
.dt-bug-id { font-size: 10px; color: #3d5566; font-weight: 700; }
.dt-bug-info { display: flex; flex-direction: column; gap: 3px; }
.dt-bug-title { font-size: 11px; color: var(--bright); font-weight: 600; }
.dt-bug-desc { font-size: 10px; color: #4a6070; line-height: 1.4; }
.dt-bug-fix { font-size: 10px; color: var(--accent); opacity: .8; }

/* ─── API ENDPOINTS ─── */
.dt-apis { display: flex; flex-direction: column; gap: 4px; }
.dt-api-row {
  display: grid;
  grid-template-columns: 8px 1fr auto auto;
  gap: 10px;
  align-items: center;
  padding: 7px 12px;
  background: var(--bg1);
  border-radius: 3px;
  font-size: 11px;
}
.dt-api-dot { width: 6px; height: 6px; border-radius: 50%; }
.dt-api-dot.live { background: var(--ok); box-shadow: 0 0 6px rgba(0,230,118,.4); }
.dt-api-dot.planned { background: var(--todo); }
.dt-api-path { color: var(--bright); font-weight: 500; }
.dt-api-handler { color: #3d5566; font-size: 10px; }
.dt-api-status { font-size: 9px; }

/* ─── SELF-REVIEW CHECKS ─── */
.dt-checks { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; }
.dt-check {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
}
.dt-check-icon { font-size: 14px; line-height: 1; }
.dt-check-text { color: var(--text); }
.dt-check.pass { border-left: 2px solid var(--ok); }
.dt-check.fail { border-left: 2px solid var(--err); }
.dt-check.skip { border-left: 2px solid var(--todo); }

/* ─── NOTES ─── */
.dt-notes {
  padding: 14px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 11px;
  line-height: 1.6;
  color: #5a7080;
}
.dt-notes strong { color: var(--bright); }

/* ─── ANIMATIONS ─── */
@keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.dt-section { animation: fade-in .4s ease both; }
.dt-section:nth-child(2) { animation-delay: .05s; }
.dt-section:nth-child(3) { animation-delay: .1s; }
.dt-section:nth-child(4) { animation-delay: .15s; }
.dt-section:nth-child(5) { animation-delay: .2s; }
.dt-section:nth-child(6) { animation-delay: .25s; }
.dt-section:nth-child(7) { animation-delay: .3s; }

/* ─── 2-COL LAYOUT ─── */
.dt-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 800px) { .dt-grid-2 { grid-template-columns: 1fr; } }
</style>

<div class="dt">

  <!-- ═══ HERO HEADER ═══ -->
  <div class="dt-hero">
    <div class="dt-hero-grid">
      <div class="dt-title-wrap">
        <div class="dt-eyebrow">Development Tracker</div>
        <div class="dt-title" x-text="plugin.name + ' — ' + plugin.id"></div>
        <div class="dt-subtitle" x-text="plugin.description"></div>
      </div>
      <div class="dt-meta-block">
        <span class="dt-version" x-text="'v' + plugin.version"></span>
        <div class="dt-meta">
          <span class="dt-meta-label">Updated</span>
          <span class="dt-meta-val" x-text="plugin.lastUpdated"></span>
        </div>
        <div class="dt-meta">
          <span class="dt-meta-label">Files</span>
          <span class="dt-meta-val" x-text="files.length"></span>
        </div>
        <div class="dt-meta">
          <span class="dt-meta-label">APIs</span>
          <span class="dt-meta-val" x-text="apis.length"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ PROGRESS STRIP ═══ -->
  <div class="dt-progress-strip">
    <div class="seg seg-done" :style="'flex:' + countStatus('done')">
      <span x-text="countStatus('done') + ' done'"></span>
    </div>
    <div class="seg seg-wip" :style="'flex:' + countStatus('wip')" x-show="countStatus('wip') > 0">
      <span x-text="countStatus('wip') + ' wip'"></span>
    </div>
    <div class="seg seg-todo" :style="'flex:' + countStatus('todo')" x-show="countStatus('todo') > 0">
      <span x-text="countStatus('todo') + ' todo'"></span>
    </div>
    <div class="seg seg-block" :style="'flex:' + countStatus('blocked')" x-show="countStatus('blocked') > 0">
      <span x-text="countStatus('blocked') + ' blocked'"></span>
    </div>
  </div>

  <div class="dt-body">

    <!-- ═══ DEVELOPMENT PHASES ═══ -->
    <div class="dt-section">
      <div class="dt-section-hdr">
        <div class="dt-section-icon" style="color:var(--accent)">&#9632;</div>
        <div class="dt-section-title">Development Phases</div>
        <div class="dt-section-count" x-text="phases.filter(p=>p.status==='done').length + '/' + phases.length + ' complete'"></div>
      </div>
      <div class="dt-phases">
        <template x-for="(phase, i) in phases" :key="i">
          <div class="dt-phase">
            <div class="dt-phase-num" :class="phase.status" x-text="i + 1"></div>
            <div class="dt-phase-info">
              <div class="dt-phase-name" x-text="phase.name"></div>
              <div class="dt-phase-desc" x-text="phase.desc"></div>
              <div class="dt-phase-files" x-show="phase.files" x-text="phase.files"></div>
            </div>
            <span class="dt-tag" :class="'dt-tag-' + phase.status" x-text="phase.status.toUpperCase()"></span>
            <span class="dt-priority" :class="'dt-p-' + phase.priority" x-text="phase.priority"></span>
          </div>
        </template>
      </div>
    </div>

    <div class="dt-grid-2">

      <!-- ═══ API ENDPOINTS ═══ -->
      <div class="dt-section">
        <div class="dt-section-hdr">
          <div class="dt-section-icon" style="color:var(--accent2)">&#9670;</div>
          <div class="dt-section-title">API Endpoints</div>
          <div class="dt-section-count" x-text="apis.filter(a=>a.live).length + '/' + apis.length + ' live'"></div>
        </div>
        <div class="dt-apis">
          <template x-for="api in apis" :key="api.path">
            <div class="dt-api-row">
              <div class="dt-api-dot" :class="api.live ? 'live' : 'planned'"></div>
              <div class="dt-api-path" x-text="api.path"></div>
              <div class="dt-api-handler" x-text="api.handler"></div>
              <span class="dt-tag" :class="api.live ? 'dt-tag-done' : 'dt-tag-todo'" x-text="api.live ? 'LIVE' : 'PLANNED'" style="font-size:8px"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- ═══ SELF-REVIEW STATUS ═══ -->
      <div class="dt-section">
        <div class="dt-section-hdr">
          <div class="dt-section-icon" style="color:var(--accent3)">&#10003;</div>
          <div class="dt-section-title">Self-Review Checks</div>
          <div class="dt-section-count" x-text="'Last: ' + selfReview.date"></div>
        </div>
        <div class="dt-checks">
          <template x-for="c in selfReview.checks" :key="c.name">
            <div class="dt-check" :class="c.pass ? 'pass' : 'fail'">
              <span class="dt-check-icon" x-text="c.pass ? '✓' : '✗'"></span>
              <span class="dt-check-text" x-text="c.name"></span>
            </div>
          </template>
        </div>
      </div>

    </div>

    <!-- ═══ BUG TRACKER ═══ -->
    <div class="dt-section">
      <div class="dt-section-hdr">
        <div class="dt-section-icon" style="color:var(--err)">&#9679;</div>
        <div class="dt-section-title">Bug Tracker</div>
        <div class="dt-section-count" x-text="bugs.filter(b=>b.status==='open').length + ' open / ' + bugs.filter(b=>b.status==='fixed').length + ' fixed'"></div>
      </div>
      <div class="dt-bugs">
        <template x-for="bug in bugs" :key="bug.id">
          <div class="dt-bug">
            <div class="dt-bug-id" x-text="'#' + bug.id"></div>
            <div class="dt-bug-info">
              <div class="dt-bug-title" x-text="bug.title"></div>
              <div class="dt-bug-desc" x-text="bug.desc"></div>
              <div class="dt-bug-fix" x-show="bug.fix" x-text="'Fix: ' + bug.fix"></div>
            </div>
            <span class="dt-tag" :class="bug.status === 'fixed' ? 'dt-tag-done' : bug.status === 'wontfix' ? 'dt-tag-block' : 'dt-tag-wip'" x-text="bug.status.toUpperCase()"></span>
            <span class="dt-priority" :class="'dt-p-' + bug.priority" x-text="bug.priority"></span>
          </div>
        </template>
        <template x-if="bugs.length === 0">
          <div style="font-size:11px;color:#3d5566;padding:10px">No bugs tracked yet</div>
        </template>
      </div>
    </div>

    <!-- ═══ FILE INVENTORY ═══ -->
    <div class="dt-section">
      <div class="dt-section-hdr">
        <div class="dt-section-icon" style="color:#78909c">&#9776;</div>
        <div class="dt-section-title">File Inventory</div>
        <div class="dt-section-count" x-text="files.length + ' files'"></div>
      </div>
      <div class="dt-files">
        <template x-for="f in files" :key="f.path">
          <div class="dt-file-row">
            <div class="dt-file-icon" x-text="f.icon"></div>
            <div class="dt-file-path"><b x-text="f.name"></b> <span x-text="' — ' + f.path" style="opacity:.5"></span></div>
            <div class="dt-file-status" :style="'color:var(--' + (f.status === 'new' ? 'accent' : f.status === 'modified' ? 'warn' : 'text') + ')'" x-text="f.status"></div>
            <span class="dt-tag" :class="'dt-tag-' + f.phase" x-text="f.phase" style="font-size:8px"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- ═══ NOTES ═══ -->
    <div class="dt-section">
      <div class="dt-section-hdr">
        <div class="dt-section-icon" style="color:#5a7080">&#9998;</div>
        <div class="dt-section-title">Notes</div>
      </div>
      <div class="dt-notes" x-html="notes"></div>
    </div>

  </div>
</div>

</div>

<script>
/**
 * Dev Tracker Data — a0_lmm_router
 *
 * UPDATE THIS DATA as development progresses.
 * This is the single source of truth for the plugin's dev status.
 */
function devTracker() {
  return {
    plugin: {
      id: 'a0_lmm_router',
      name: 'LMM Router',
      version: '1.2.2',
      description: 'Unified LMM server management + smart routing. v1.2.0: compose relocated. v1.2.1: failover chains, stats dashboard. v1.2.2: GUI-driven multi-model slot assignment, HF install form, VRAM-aware Load/Unload.',

      { name: 'local_inference Tool', desc: 'Agent tool for sending prompts to local models with task-specific system prompts', files: 'tools/local_inference.py, prompts/agent.system.tool.local_inference.md', status: 'todo', priority: 'crit' },

      { name: 'Task Classifier', desc: 'Keyword + LLM classify via utility slot for domain/complexity routing', files: 'helpers/smart_router/task_classifier.py', status: 'todo', priority: 'high' },
      { name: 'Task Executor + Router Upgrade', desc: 'Connect classification to slot selection + system prompt + payload build', files: 'helpers/smart_router/task_executor.py, extensions/.../_20_smart_router.py', status: 'todo', priority: 'high' },
      { name: 'Terminal Delegation Tool', desc: 'Spawn terminal sessions powered by local models with streaming results', files: 'tools/local_terminal.py, prompts/agent.system.tool.local_terminal.md', status: 'todo', priority: 'low' },
